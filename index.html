    function logLabels() { return LOG_LABELS[currentLang] || LOG_LABELS.zh; }

    function formatLogDate(isoDate, lang) {
      if (!isoDate) return '';
      const d = new Date(isoDate + 'T00:00:00');
      if (isNaN(d.getTime())) return isoDate;
      const weekdayZh = ['日', '一', '二', '三', '四', '五', '六'];
      const weekdayEn = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      if (lang === 'en') {
        const months = ['January', 'February', 'March', 'April', 'May', 'June',
                        'July', 'August', 'September', 'October', 'November', 'December'];
        return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} · ${weekdayEn[d.getDay()]}`;
      }
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}年${m}月${day}日  周${weekdayZh[d.getDay()]}`;
    }

    function formatRoastDate(isoDate) {
      if (!isoDate) return '';
      const d = new Date(isoDate + 'T00:00:00');
      if (isNaN(d.getTime())) return isoDate;
      const y = String(d.getFullYear()).slice(-2);
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}.${m}.${day}`;
    }

    // Whole days between the calendar day of `iso` and `nowMs` (default now).
    // Returns null for falsy/unparseable input. nowMs is injectable for tests.
    function relativeDays(iso, nowMs) {
      if (!iso) return null;
      const then = Date.parse(iso);
      if (Number.isNaN(then)) return null;
      const now = (typeof nowMs === 'number') ? nowMs : Date.now();
      const dayMs = 24 * 60 * 60 * 1000;
      const startOfDay = (ms) => {
        const d = new Date(ms);
        return Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
      };
      return Math.max(0, Math.round((startOfDay(now) - startOfDay(then)) / dayMs));
    }

    // Backup is "stale" once it's been this many days since the last export.
    const BACKUP_STALE_DAYS = 14;
    function isBackupStale(iso, nowMs) {
      const days = relativeDays(iso, nowMs);
      return days !== null && days >= BACKUP_STALE_DAYS;
    }

    // ── v4 info layer: card-derived display helpers ──────────────────
    // A bag's rating trajectory, oldest-first, with unrated brews dropped.
    // Brews are stored newest-first, but order can shift across import/merge,
    // so sort by createdAt rather than trust array position.
    function bagSeries(bag) {
      if (!bag || !Array.isArray(bag.brews)) return [];
      return bag.brews
        .filter(b => b && (Number(b.rating) || 0) >= 1)
        .slice()
        .sort((a, b) => String(a.createdAt || '').localeCompare(String(b.createdAt || '')))
        .map(b => Math.max(1, Math.min(5, Number(b.rating) || 0)));
    }

    // Trend = mean of the last third minus mean of the first third. Needs at
    // least 4 rated brews to read as a trend rather than noise ("tuning").
    function bagTrend(series) {
      if (!Array.isArray(series) || series.length < 4) return 'tuning';
      const k = Math.ceil(series.length / 3);
      const avg = arr => arr.reduce((a, b) => a + b, 0) / arr.length;
      const d = avg(series.slice(-k)) - avg(series.slice(0, k));
      if (d >= 0.5) return 'rising';
      if (d <= -0.4) return 'falling';
      return 'stable';
    }

    // Freshness tier from days-since-roast. `finished` wins over age; a bag with
    // no roast date (days === null) gets no badge.
    function bagFreshness(days, finished) {
      if (finished) return 'finished';
      if (days == null) return null;
      if (days < 7) return 'resting';
      if (days <= 28) return 'peak';
      if (days <= 42) return 'late';
      return 'fading';
    }

    // "C40 24 · 1:15" — grinder (model + setting) then brew ratio, each part
    // dropped when its data is missing.
    function bestRecipeString(bag, brew) {
      if (!brew) return '';
      const grinder = [bag && bag.grinderModel, brew.grinderSetting]
        .map(x => String(x == null ? '' : x).trim()).filter(Boolean).join(' ');
      let ratio = '';
      const dose = Number(brew.brew && brew.brew.dose);
      const yld = Number(brew.brew && brew.brew.yield);
      if (dose > 0 && yld > 0) ratio = '1:' + Math.round(yld / dose);
      return [grinder, ratio].filter(Boolean).join(' · ');
    }

    // SVG geometry for the sparkline: rating domain 1..5 (high on top), x evenly
    // spaced, single point centered. Returns the path `d` plus the end point.
    function sparklinePath(series, W, H, p) {
      const max = 5, min = 1, n = series.length;
      const xs = i => n <= 1 ? W / 2 : p + i * (W - 2 * p) / (n - 1);
      const ys = v => H - p - (Math.max(min, Math.min(max, v)) - min) / (max - min) * (H - 2 * p);
      const d = series.map((v, i) => (i ? 'L' : 'M') + xs(i).toFixed(1) + ' ' + ys(v).toFixed(1)).join(' ');
      return { d, x: xs(n - 1), y: ys(series[n - 1]) };
    }

    // ── v4 drag reorder + one-click taste-window sort ────────────────
    // Sort priority for "赏味期排序": peak first, then late peak, resting,
    // fading (and roast-date-less bags), finished last. nowMs is injectable.
    function freshRank(bag, nowMs) {
      if (bag && bag.status === 'finished') return 4;
      const days = relativeDays(bag && bag.roastDate, nowMs);
      if (days == null) return 3;
      if (days >= 7 && days <= 28) return 0;
      if (days > 28 && days <= 42) return 1;
      if (days < 7) return 2;
      return 3;
    }

    // Stable taste-window sort: rank, then ascending age. Returns a new array.
    function sortBagsByFreshness(bags, nowMs) {
      return (bags || []).slice().sort((a, b) => {
        const ra = freshRank(a, nowMs), rb = freshRank(b, nowMs);
        if (ra !== rb) return ra - rb;
        const da = relativeDays(a && a.roastDate, nowMs);
        const db = relativeDays(b && b.roastDate, nowMs);
        return (da == null ? Infinity : da) - (db == null ? Infinity : db);
      });
    }

    // Drop slot = how many OTHER cards have their midpoint above the dragged
    // card's current center. Pure so the index math is unit-testable.
    function computeDropIndex(rects, fromIndex, centerY) {
      let count = 0;
      for (let i = 0; i < rects.length; i++) {
        if (i === fromIndex) continue;
        if (rects[i].top + rects[i].h / 2 < centerY) count++;
      }
      return count;
    }

    // Pure helpers behind discard-undo: mutate `bags` in place so callers can
    // saveJournal() the same array they loaded.
    function removeBrewFromBags(bags, bagId, brewId) {
      const bag = (bags || []).find(b => b && b.id === bagId);
      if (!bag || !Array.isArray(bag.brews)) return null;
      const index = bag.brews.findIndex(b => b && b.id === brewId);
      if (index === -1) return null;
      const brew = bag.brews.splice(index, 1)[0];
      return { brew, index };
    }

    function restoreBrewToBags(bags, bagId, brew, index) {
      if (!brew) return false;
      const bag = (bags || []).find(b => b && b.id === bagId);
      if (!bag || !Array.isArray(bag.brews)) return false;
      if (bag.brews.some(b => b && b.id === brew.id)) return false;
      const at = Math.max(0, Math.min(
        typeof index === 'number' ? index : bag.brews.length,
        bag.brews.length
      ));
      bag.brews.splice(at, 0, brew);
      return true;
    }

    function getPath(obj, path) {
      return path.split('.').reduce((o, k) => (o == null ? o : o[k]), obj);
    }

    function clearChildren(node) {
      while (node && node.firstChild) node.removeChild(node.firstChild);
    }

    function el(tag, opts, children) {
      const node = document.createElement(tag);
      if (opts) {
        for (const [k, v] of Object.entries(opts)) {
          if (v == null || v === false) continue;
          if (k === 'class') node.className = v;
          else if (k === 'text') node.textContent = v;
          else if (k === 'dataset') Object.assign(node.dataset, v);
          else if (k.startsWith('on')) node.addEventListener(k.slice(2), v);
          else node.setAttribute(k, v);
        }
      }
      if (Array.isArray(children)) {
        for (const c of children) if (c) node.appendChild(c);
      }
      return node;
    }

    // el()'s SVG sibling: SVG elements need the SVG namespace or the browser
    // renders an inert HTMLUnknownElement. attrs are all setAttribute (no
    // className/dataset shortcuts — SVG doesn't need them here).
    const SVG_NS = 'http://www.w3.org/2000/svg';
    function svgEl(tag, attrs, children) {
      const node = document.createElementNS(SVG_NS, tag);
      if (attrs) for (const [k, v] of Object.entries(attrs)) {
        if (v != null) node.setAttribute(k, v);
      }
      if (Array.isArray(children)) for (const c of children) if (c) node.appendChild(c);
      return node;
    }

    // App-level toast. One at a time — a new toast replaces the current one
    // and restarts its float-in (and countdown line, when it has one).
    let toastTimer = null;
    let toastShowTimer = null;
    let toastExitTimer = null;
    function showToast(message, opts) {
      const node = document.getElementById('appToast');
      if (!node) return;
      const o = opts || {};
      const durationMs = typeof o.durationMs === 'number' ? o.durationMs : 8000;
      if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
      if (toastShowTimer) { clearTimeout(toastShowTimer); toastShowTimer = null; }
      if (toastExitTimer) { clearTimeout(toastExitTimer); toastExitTimer = null; }
      clearChildren(node);
      node.classList.remove('is-shown');
      node.appendChild(el('span', { class: 'app-toast-msg', text: message }));
      if (o.actionLabel && typeof o.onAction === 'function') {
        node.appendChild(el('button', {
          class: 'app-toast-action', type: 'button', text: o.actionLabel,
          onclick: () => { hideToast(); o.onAction(); }
        }));
      }
      if (o.countdown) {
        const line = el('div', { class: 'app-toast-countdown' });
        line.style.animationDuration = (durationMs / 1000) + 's';
        node.appendChild(line);
      }
      node.hidden = false;
      if (prefersReducedMotion()) node.classList.add('is-shown');
      else toastShowTimer = setTimeout(() => { toastShowTimer = null; node.classList.add('is-shown'); }, 30);
      toastTimer = setTimeout(hideToast, durationMs);
    }

    function hideToast() {
      if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
      if (toastShowTimer) { clearTimeout(toastShowTimer); toastShowTimer = null; }
      const node = document.getElementById('appToast');
      if (!node || node.hidden) return;
      node.classList.remove('is-shown');
      const finish = () => { node.hidden = true; clearChildren(node); };
      if (prefersReducedMotion()) { finish(); return; }
      if (toastExitTimer) clearTimeout(toastExitTimer);
      toastExitTimer = setTimeout(() => { toastExitTimer = null; finish(); }, 350);
    }

    function renderJournal(route) {
      const root = document.getElementById('journalView');
      if (!root) return;
      // Confirm state is in-memory only; leaving the dashboard resets it.
      if (route.view !== 'dashboard') confirmingBagId = null;
      confirmingCard = null; // DOM refs go stale on every re-render
      clearChildren(root);
      const { bags, corrupt } = BrewLog.loadJournal();

      if (route.view === 'bag') {
        const bag = bags.find(b => b.id === route.bagId);
        if (!bag) { renderDashboard(root, bags, corrupt); return; }
        renderBagView(root, bags, bag, route.brewId);
        return;
      }
      renderDashboard(root, bags, corrupt);
    }

    function renderDashboard(root, bags, corrupt) {
      const L = logLabels();
      const shell = el('div', { class: 'journal-shell' });

      const lastBackup = BrewLog.getLastBackupAt();
      // Stale when overdue by the threshold, or when there's data that has never
      // been backed up at all. An empty journal never nags.
      const stale = isBackupStale(lastBackup) || (lastBackup === null && bags.length > 0);
      let backupText = lastBackup === null
        ? L.neverBackedUp
        : L.lastBackup(relativeDays(lastBackup) || 0);
      if (stale && lastBackup !== null) backupText += ' · ' + L.backupNudge;

      shell.appendChild(el('div', { class: 'journal-toolbar' }, [
        el('div', { class: 'journal-toolbar-group' }, [
          el('button', { class: 'journal-btn primary', type: 'button', text: L.newBag, onclick: onNewBag }),
          bags.length >= 2 ? el('button', {
            class: 'journal-btn', type: 'button', text: L.sortFreshness,
            title: L.sortFreshnessHint, onclick: onSortFreshness
          }) : null
        ]),
        el('div', { class: 'journal-toolbar-group' }, [
          el('span', { class: 'journal-backup-status' + (stale ? ' is-stale' : ''), text: backupText }),
          el('button', { class: 'journal-btn', type: 'button', text: L.importBtn, onclick: onImportJournal }),
          el('button', { class: 'journal-btn', type: 'button', text: L.exportBtn, onclick: onExportJournal })
        ])
      ]));

      if (corrupt) shell.appendChild(el('div', { class: 'journal-corrupt-banner', text: L.corrupt }));

      if (bags.length === 0) {
        shell.appendChild(el('div', { class: 'journal-empty' }, [
          el('div', { class: 'journal-empty-msg', text: L.emptyBags }),
          el('button', { class: 'journal-btn primary', type: 'button', text: L.newFirstBag, onclick: onNewBag })
        ]));
        root.appendChild(shell);
        return;
      }

      const list = el('div', { class: 'bag-list' });
      cardWraps = {}; // stale refs from the prior render are gone now
      for (const bag of bags) list.appendChild(renderBagCard(bag));
      shell.appendChild(list);
      root.appendChild(shell);
    }

    // Short "烘焙 3月28日" / "roasted Mar 28" label for the meta row.
    function formatRoastShort(iso, lang) {
      if (!iso) return '';
      const dt = new Date(iso + 'T00:00:00');
      if (isNaN(dt.getTime())) return iso;
      if (lang === 'en') {
        const mon = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                     'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'][dt.getMonth()];
        return mon + ' ' + dt.getDate();
      }
      return (dt.getMonth() + 1) + '月' + dt.getDate() + '日';
    }

    function freshnessBadge(tier) {
      if (!tier) return null;
      const L = logLabels();
      return el('span', { class: 'bag-fresh-badge is-' + tier, text: L.freshness[tier] });
    }

    // Inline SVG rating-trajectory sparkline (rating domain 1..5). No stroke
    // grow-in animation — it was unstable under re-render/screenshot (handoff).
    function sparklineEl(series, finished) {
      if (!series.length) return null;
      const W = 70, H = 22, p = 3;
      const geo = sparklinePath(series, W, H, p);
      return svgEl('svg', {
        width: W, height: H, viewBox: '0 0 ' + W + ' ' + H,
        class: 'bag-spark' + (finished ? ' is-finished' : ''), 'aria-hidden': 'true'
      }, [
        svgEl('line', { x1: p, y1: H - p, x2: W - p, y2: H - p, class: 'bag-spark-base' }),
        svgEl('path', { d: geo.d, class: 'bag-spark-line' }),
        svgEl('circle', { cx: geo.x.toFixed(1), cy: geo.y.toFixed(1), r: 2.3, class: 'bag-spark-dot' })
      ]);
    }

    // Five coffee-ring pips; the first `rating` are "filled" (stained).
    function ratingRings(rating, size) {
      const r = Math.max(0, Math.min(5, Number(rating) || 0));
      const pips = [];
      for (let i = 0; i < 5; i++) {
        pips.push(el('span', { class: 'bag-ring' + (i < r ? ' is-on' : '') }));
      }
      return el('span', {
        class: 'bag-rings', 'aria-label': r + '/5',
        style: '--ring-size:' + (size || 9) + 'px'
      }, pips);
    }

    // "Best so far" bar: rating + the recipe that earned it, pinned to the card
    // so the target reads before opening the bag.
    function bestBar(bag, best) {
      if (!best) return null;
      const L = logLabels();
      const recipe = bestRecipeString(bag, best);
      const children = [
        el('span', { class: 'bag-best-label', text: L.bestLabel }),
        ratingRings(best.rating, 9)
      ];
      if (recipe) children.push(el('span', { class: 'bag-best-recipe', text: recipe }));
      return el('div', { class: 'bag-best' }, children);
    }

    function renderBagCard(bag) {
      const L = logLabels();
      const best = BrewLog.bestBrew(bag);
      const confirming = bag.id === confirmingBagId;
      const finished = bag.status === 'finished';
      const series = bagSeries(bag);
      const trendKey = bagTrend(series);
      const freshKey = bagFreshness(relativeDays(bag.roastDate), finished);
      const refs = {};

      // Front: not a <button> — the delete control inside must be a real <button>,
      // and buttons can't nest. role+tabindex+keydown keep it keyboard-reachable.
      const front = el('div', {
        class: 'bag-card' + (finished ? ' is-finished' : ''),
        role: 'button', tabindex: '0'
      }, [
        gripHandle(bag.id),
        el('div', { class: 'bag-card-name', text: bag.name || L.untitledBag }),
        el('div', { class: 'bag-card-meta-row' }, [
          bag.origin ? el('span', { class: 'bag-origin', text: bag.origin }) : null,
          freshnessBadge(freshKey),
          bag.roastDate ? el('span', { class: 'bag-submeta',
            text: L.roastedPrefix + ' ' + formatRoastShort(bag.roastDate, currentLang) }) : null
        ]),
        bestBar(bag, best),
        el('div', { class: 'bag-card-stats-row' }, [
          el('div', { class: 'bag-trend-group' }, [
            sparklineEl(series, finished),
            el('span', { class: 'bag-trend is-' + trendKey, text: L.trend[trendKey] })
          ]),
          el('span', { class: 'bag-card-count', text: L.brewCount(bag.brews.length) })
        ]),
        el('button', {
          class: 'bag-card-delete', type: 'button', text: '×', 'aria-label': L.deleteBag,
          onclick: (e) => { e.stopPropagation(); onDeleteBagClick(bag.id, refs); }
        }),
        finished ? el('div', { class: 'bag-finished-stamp', 'aria-hidden': 'true',
          text: L.freshness.finished }) : null
      ]);
      front.addEventListener('click', () => navigate('#/bag/' + bag.id));
      front.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); navigate('#/bag/' + bag.id); }
      });

      // Back: the in-place confirm, revealed by flipping the card over.
      const back = el('div', { class: 'bag-card-back' }, [
        el('div', { class: 'bag-card-name', text: L.confirmDeleteBag }),
        el('div', { class: 'bag-card-meta', text: L.confirmDeleteMeta(bag.brews.length) }),
        el('div', { class: 'bag-card-confirm-actions' }, [
          el('button', {
            class: 'bag-card-confirm-delete', type: 'button', text: L.deleteConfirm,
            onclick: (e) => { e.stopPropagation(); onConfirmDeleteBag(bag.id, refs.wrap); }
          }),
          el('button', {
            class: 'bag-card-confirm-keep', type: 'button', text: L.deleteKeep,
            onclick: (e) => { e.stopPropagation(); onKeepBag(); }
          })
        ])
      ]);

      const flip = el('div', { class: 'bag-card-flip' + (confirming ? ' is-confirming' : '') }, [front, back]);
      const entering = bag.id === enteringBagId;
      const wrap = el('div', {
        class: 'bag-card-wrap' + (entering ? ' is-collapsing is-collapsed' : ''),
        'data-bag-id': bag.id
      }, [flip]);

      refs.wrap = wrap; refs.flip = flip; refs.front = front; refs.back = back;
      front.inert = confirming;
      back.inert = !confirming;
      if (confirming) confirmingCard = refs;
      if (entering) enteringWrap = wrap;
      cardWraps[bag.id] = wrap; // live ref for drag transforms + FLIP
      return wrap;
    }

    function onNewBag() {
      const { bags } = BrewLog.loadJournal();
      const bag = BrewLog.createBag();
      BrewLog.saveJournal([bag, ...bags]);
      navigate('#/bag/' + bag.id);
    }

    function onExportJournal() {
      const { bags } = BrewLog.loadJournal();
      const payload = BrewLog.exportJournal(bags);
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `brew-journal-${BrewLog.todayISO()}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      BrewLog.setLastBackupAt(new Date().toISOString());
    }

    function importJournalText(raw) {
      const L = logLabels();
      let parsed;
      try { parsed = JSON.parse(raw); } catch (_) {
        if (typeof alert === 'function') alert(L.importInvalid);
        return;
      }
      const incoming = BrewLog.extractBags(parsed);
      if (!incoming) {
        if (typeof alert === 'function') alert(L.importInvalid);
        return;
      }
      const { bags } = BrewLog.loadJournal();
      const { bags: merged, addedBags, addedBrews } = BrewLog.mergeJournalImport(bags, incoming);
      BrewLog.saveJournal(merged);
      if (typeof alert === 'function') {
        const added = addedBags + addedBrews;
        alert(added > 0 ? L.importOk(added) : L.importNone);
      }
      applyRoute();
    }

    function onImportJournal() {
      if (typeof FileReader !== 'function') return;
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'application/json,.json';
      input.addEventListener('change', () => {
        const file = input.files && input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => importJournalText(String(reader.result || ''));
        reader.readAsText(file);
      });
      input.click();
    }

    function renderBagView(root, bags, bag, brewId) {
      const L = logLabels();
      const shell = el('div', { class: 'journal-shell', 'data-bag-id': bag.id });

      shell.appendChild(el('div', { class: 'journal-toolbar' }, [
        el('div', { class: 'journal-toolbar-group' }, [
          el('button', { class: 'journal-btn', type: 'button', text: L.backToBags,
            onclick: () => navigate('#/') })
        ]),
        el('div', { class: 'journal-toolbar-group' }, [
          el('button', { class: 'journal-btn primary', type: 'button', text: L.newBrew,
            onclick: () => onNewBrew(bag.id) })
        ])
      ]));

      shell.appendChild(renderBagHeader(bag));

      if (bag.brews.length === 0) {
        shell.appendChild(el('div', { class: 'journal-empty' }, [
          el('div', { class: 'journal-empty-msg', text: L.emptyBrews }),
          el('button', { class: 'journal-btn primary', type: 'button', text: L.newFirstBrew,
            onclick: () => onNewBrew(bag.id) })
        ]));
        root.appendChild(shell);
        return;
      }

      const best = BrewLog.bestBrew(bag);
      if (best) {
        shell.appendChild(el('div', { class: 'best-brew-banner', text: L.bestBrewLabel }));
        shell.appendChild(renderBrewCard(bag, best, brewId === best.id, true));
      }

      // Group remaining brews by method (compare like-with-like).
      const rest = bag.brews.filter(b => !best || b.id !== best.id);
      const byMethod = new Map();
      for (const b of rest) {
        const m = (b.brew && b.brew.method) ? String(b.brew.method) : L.methodless;
        if (!byMethod.has(m)) byMethod.set(m, []);
        byMethod.get(m).push(b);
      }
      for (const [method, group] of byMethod) {
        shell.appendChild(el('div', { class: 'method-group-title', text: method }));
        group
          .slice()
          .sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''))
          .forEach(b => shell.appendChild(renderBrewCard(bag, b, brewId === b.id, false)));
      }

      root.appendChild(shell);
    }

    function onNewBrew(bagId) {
      const { bags } = BrewLog.loadJournal();
      const bag = bags.find(b => b.id === bagId);
      if (!bag) return;
      const brew = BrewLog.createBrew();
      bag.brews = [brew, ...bag.brews];
      BrewLog.saveJournal(bags);
      navigate('#/bag/' + bagId + '/' + brew.id);
    }

    function renderBagHeader(bag) {
      const L = logLabels();
      const field = (fieldKey, labelKey, value, opts) => el('div', { class: 'bag-id-field' }, [
        el('div', { class: 'bag-id-label', text: L[labelKey] }),
        el('div', Object.assign({
          class: 'bag-id-value log-editable' + (value ? '' : ' is-empty'),
          contenteditable: 'true', spellcheck: 'false',
          'data-scope': 'bag', 'data-field': fieldKey,
          'data-placeholder': L.fieldPh, text: value || ''
        }, opts || {}))
      ]);
      return el('div', { class: 'bag-header', 'data-bag-id': bag.id }, [
        el('div', { class: 'bag-header-row' }, [
          field('name', 'bagName', bag.name),
          field('origin', 'bagOrigin', bag.origin)
        ]),
        el('div', { class: 'bag-header-row' }, [
          // Native date picker, not contenteditable: mobile keyboards left the
          // typed text invisible after commit, and roastDate is half of the
          // bag's natural key so only the picker's ''/ISO output is acceptable.
          el('div', { class: 'bag-id-field' }, [
            el('div', { class: 'bag-id-label', text: L.bagRoastDate }),
            el('input', {
              type: 'date', class: 'bag-id-value log-editable',
              'data-scope': 'bag', 'data-field': 'roastDate',
              value: bag.roastDate || ''
            })
          ]),
          field('roastLevel', 'bagRoastLevel', bag.roastLevel),
          field('grinderModel', 'bagGrinderModel', bag.grinderModel)
        ])
      ]);
    }

    const BREW_FIELD_SCHEMA = [
      { key: 'grinderSetting', labelKey: 'brewGrindSetting' },
      { key: 'brew.method', labelKey: 'brewMethod' },
      { key: 'brew.dripper', labelKey: 'brewDripper' },
      { key: 'brew.waterTempC', labelKey: 'brewWaterTemp' },
      { key: 'brew.dose', labelKey: 'brewDose' },
      { key: 'brew.yield', labelKey: 'brewYield' },
      { key: 'brew.totalTimeSec', labelKey: 'brewTime' },
      { key: 'brew.pourSegments', labelKey: 'brewPours' },
      { key: 'extraction.tds', labelKey: 'extractionTds' },
      { key: 'extraction.ey', labelKey: 'extractionEy' }
    ];

    function renderBrewRating(brew) {
      const rating = Math.max(0, Math.min(5, Number(brew.rating) || 0));
      const ratingEl = el('div', { class: 'brew-rating', role: 'radiogroup', 'aria-label': 'rating' });
      for (let i = 1; i <= 5; i++) {
        ratingEl.appendChild(el('span', {
          class: 'log-star' + (i <= rating ? '' : ' is-empty'),
          'data-rating': String(i), role: 'radio',
          'aria-checked': i === rating ? 'true' : 'false', tabindex: '0',
          text: i <= rating ? '✦' : '✧'
        }));
      }
      return ratingEl;
    }

    function renderBrewCard(bag, brew, isOpen, isBest) {
      const L = logLabels();
      const card = el('article', {
        class: 'brew-card' + (isBest ? ' is-best' : '') + (isOpen ? ' is-open' : ''),
        'data-bag-id': bag.id, 'data-brew-id': brew.id
      });

      card.appendChild(el('div', { class: 'brew-card-head' }, [
        el('span', {
          class: 'brew-date log-editable', contenteditable: 'true', spellcheck: 'false',
          'data-scope': 'brew', 'data-field': 'date', 'data-type': 'date',
          text: formatLogDate(brew.date, currentLang)
        }),
        el('span', {
          class: 'brew-weather log-editable' + (brew.weather ? '' : ' is-empty'),
          contenteditable: 'true', 'data-scope': 'brew', 'data-field': 'weather',
          'data-placeholder': L.weatherPh, text: brew.weather || ''
        }),
        renderBrewRating(brew)
      ]));

      // Collapsed cards show a one-line summary; the open card shows the full grid.
      if (!isOpen) {
        const summary = BREW_FIELD_SCHEMA.slice(0, 3)
          .map(f => getPath(brew, f.key)).filter(Boolean).join('  ·  ');
        card.appendChild(el('div', { class: 'brew-card-summary', text: summary || L.fieldPh }));
        card.addEventListener('click', (e) => {
          if (e.target.closest && e.target.closest('.log-editable, .log-star')) return;
          navigate('#/bag/' + bag.id + '/' + brew.id);
        });
        return card;
      }

      const grid = el('div', { class: 'brew-fields' });
      for (const f of BREW_FIELD_SCHEMA) {
        const val = getPath(brew, f.key);
        const isEmpty = val == null || val === '';
        grid.appendChild(el('div', { class: 'brew-field-label', text: L[f.labelKey] }));
        const value = el('div', {
          class: 'brew-field-value log-editable' + (isEmpty ? ' is-empty' : ''),
          contenteditable: 'true', 'data-scope': 'brew', 'data-field': f.key,
          'data-placeholder': L.fieldPh, text: isEmpty ? '' : String(val)
        });
        if (f.key === 'grinderSetting') {
          // Translate button is a SIBLING (not a child) so it neither pollutes the
          // field's textContent value nor gets wiped when the field saves on blur.
          grid.appendChild(el('div', { class: 'brew-grind-cell' }, [
            value,
            el('button', { class: 'grind-translate-btn', type: 'button',
              text: L.translateGrind, title: L.translateGrind })
          ]));
        } else {
          grid.appendChild(value);
        }
      }
      card.appendChild(grid);

      card.appendChild(el('div', { class: 'brew-section' }, [
        el('div', { class: 'brew-section-title', text: L.secFlavor }),
        el('div', { class: 'brew-prose log-editable' + (brew.flavorNotes ? '' : ' is-empty'),
          contenteditable: 'true', 'data-scope': 'brew', 'data-field': 'flavorNotes',
          'data-placeholder': L.prosePh, text: brew.flavorNotes || '' })
      ]));
      card.appendChild(el('div', { class: 'brew-section' }, [
        el('div', { class: 'brew-section-title', text: L.secReflection }),
        el('div', { class: 'brew-prose log-editable' + (brew.reflection ? '' : ' is-empty'),
          contenteditable: 'true', 'data-scope': 'brew', 'data-field': 'reflection',
          'data-placeholder': L.prosePh, text: brew.reflection || '' })
      ]));

      card.appendChild(el('div', { class: 'brew-footer-actions' }, [
        el('button', { class: 'brew-discard', type: 'button', text: L.discardBrew,
          onclick: () => onDiscardBrew(bag.id, brew.id) })
      ]));
      return card;
    }

    function parseIsoDate(iso) {
      if (typeof iso !== 'string') return null;
      const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!m) return null;
      const y = +m[1], mo = +m[2], d = +m[3];
      const dt = new Date(y, mo - 1, d);
      if (dt.getFullYear() !== y || dt.getMonth() !== mo - 1 || dt.getDate() !== d) return null;
      return dt;
    }

    // Write a value at a dotted path on a plain object; creates intermediate objects if missing.
    function setPath(obj, path, value) {
      const parts = path.split('.');
      let cur = obj;
      for (let i = 0; i < parts.length - 1; i++) {
        if (cur[parts[i]] == null || typeof cur[parts[i]] !== 'object') cur[parts[i]] = {};
        cur = cur[parts[i]];
      }
      cur[parts[parts.length - 1]] = value;
    }

    // Resolve an editable element to its (bagId, brewId|null, scope) target.
    function findEditableHost(target) {
      if (!target || !target.classList || !target.classList.contains('log-editable')) return null;
      const scope = target.dataset ? target.dataset.scope : null;
      if (scope === 'bag') {
        const header = target.closest ? target.closest('.bag-header') : null;
        const bagId = header && header.dataset ? header.dataset.bagId : null;
        return bagId ? { el: target, scope: 'bag', bagId, brewId: null } : null;
      }
      const card = target.closest ? target.closest('.brew-card') : null;
      if (!card || !card.dataset) return null;
      return { el: target, scope: 'brew', bagId: card.dataset.bagId, brewId: card.dataset.brewId };
    }

    function findBrew(bags, host) {
      const bag = bags.find(b => b.id === host.bagId);
      if (!bag) return { bag: null, brew: null };
      if (host.scope === 'bag') return { bag, brew: null };
      return { bag, brew: bag.brews.find(b => b.id === host.brewId) || null };
    }

    function onEditableFocus(e) {
      const host = findEditableHost(e.target);
      if (!host) return;
      host.el.classList.remove('is-empty');
      if (host.el.dataset.type === 'date') {
        const { bags } = BrewLog.loadJournal();
        const { brew } = findBrew(bags, host);
        if (brew) host.el.textContent = brew.date || '';
      }
    }

    function onEditableBlur(e) {
      const host = findEditableHost(e.target);
      if (!host) return;
      const path = host.el.dataset.field;
      if (!path) return;
      const { bags } = BrewLog.loadJournal();
      const { bag, brew } = findBrew(bags, host);
      const targetObj = host.scope === 'bag' ? bag : brew;
      if (!targetObj) return;

      // Prose fields allow line breaks (see onLogKeydown); read via innerText so
      // the browser-inserted block/<br> breaks survive as \n instead of being
      // collapsed by textContent. Single-line fields keep using textContent.
      const isInput = host.el.tagName === 'INPUT';
      const isProse = host.el.classList && host.el.classList.contains('brew-prose');
      let newValue = ((isInput ? host.el.value
        : isProse ? host.el.innerText : host.el.textContent) || '').trim();
      if (host.el.dataset.type === 'date') {
        const parsed = parseIsoDate(newValue);
        if (!parsed) newValue = (brew && brew.date) || '';
        setPath(targetObj, path, newValue);
        host.el.textContent = formatLogDate(newValue, currentLang);
      } else {
        // A bag's roastDate is half of its natural identity key, so reject
        // anything that isn't a valid ISO date — revert to the stored value
        // rather than letting garbage split the bag on a later import/merge.
        if (host.scope === 'bag' && path === 'roastDate' && newValue && !parseIsoDate(newValue)) {
          newValue = getPath(targetObj, path) || '';
        }
        setPath(targetObj, path, newValue);
        if (isInput) host.el.value = newValue;
        else host.el.textContent = newValue;
      }
      host.el.classList.toggle('is-empty', newValue === '');
      BrewLog.saveJournal(bags);
    }

    function onLogClick(e) {
      // Inline grind-translate: jump to the converter pre-targeted at the bag's grinder.
      const translate = e.target && e.target.closest ? e.target.closest('.grind-translate-btn') : null;
      if (translate) {
        e.preventDefault();
        const header = document.querySelector('.bag-header');
        const modelEl = header ? header.querySelector('[data-field="grinderModel"]') : null;
        navigate('#/convert');
        preselectConverterTarget(modelEl ? modelEl.textContent : '');
        return;
      }
      const star = e.target && e.target.closest ? e.target.closest('.log-star') : null;
      if (!star) return;
      const card = star.closest('.brew-card');
      if (!card || !card.dataset) return;
      const { bags } = BrewLog.loadJournal();
      const bag = bags.find(b => b.id === card.dataset.bagId);
      if (!bag) return;
      const brew = bag.brews.find(b => b.id === card.dataset.brewId);
      if (!brew) return;
      const rating = Number(star.dataset.rating) || 0;
      brew.rating = brew.rating === rating ? 0 : rating;
      BrewLog.saveJournal(bags);
      applyRoute();
    }

    // Best-effort map a free-text grinder model to a converter target select value.
    function preselectConverterTarget(model) {
      const m = String(model || '').toLowerCase();
      let target = null;
      if (m.includes('c40') || m.includes('comandante')) target = 'c40';
      else if (m.includes('k-ultra') || m.includes('kultra') || m.includes('1zpresso')) target = 'kUltra';
      else if (m.includes('ek43') || m.includes('mahlk')) target = 'ek43';
      if (!target) return;
      targetGrinder = target;
      if (elements.targetSelect) elements.targetSelect.value = target;
      // The point of the translate jump is to convert INTO the bag's grinder, so
      // if the source already equals it the converter would just show the no-op
      // "same grinder" message. Pick a different source so a real conversion shows.
      if (sourceGrinder === target) {
        const alt = ['kUltra', 'c40', 'ek43'].find(g => g !== target);
        sourceGrinder = alt;
        if (elements.sourceSelect) elements.sourceSelect.value = alt;
      }
      if (typeof convert === 'function') convert();
    }

    // Bag deletion follows the discard pattern: an in-place confirm replaces
    // the card (by flipping it over), the delete itself lands once the card's
    // exit animation ends, and the toast's undo window (one most-recent
    // deletion, in-memory only) is the safety net.
    let confirmingBagId = null;  // bag whose card shows the confirm face
    let confirmingCard = null;   // its live DOM refs { wrap, flip, front, back }
    let lastDeletedBag = null;
    let enteringBagId = null;    // bag that should mount collapsed (undo return)
    let enteringWrap = null;

    function prefersReducedMotion() {
      return typeof matchMedia === 'function' && matchMedia('(prefers-reduced-motion: reduce)').matches;
    }

    // ── Drag-to-reorder (Pointer Events, FLIP landing) ───────────────
    // Only the left grip starts a drag — clicking the card body / × / confirm
    // never does (zero conflict). Live wrap elements are tracked by bag id so
    // the drag can transform them directly and FLIP them on drop.
    let cardWraps = {};          // bag id → its .bag-card-wrap (this render)
    let dragState = null;        // { id, order, fromIndex, toIndex, startY, deltaY, rects, dragH }

    function liftShadow() {
      // effectiveDark() is defined in the dark-mode block below (hoisted); it
      // honours the manual ☾/☀ override, not just the system preference.
      return (typeof effectiveDark === 'function' && effectiveDark())
        ? '0 16px 38px rgba(0,0,0,0.5)' : '0 14px 34px rgba(45,42,38,0.22)';
    }

    function gripHandle(bagId) {
      const L = logLabels();
      const dots = [];
      for (let i = 0; i < 6; i++) dots.push(el('span', { class: 'bag-grip-dot' }));
      const grip = el('div', {
        class: 'bag-grip', role: 'button', tabindex: '-1', 'aria-label': L.dragSort,
        onpointerdown: (e) => onGripPointerDown(bagId, e),
        // a press-release on the grip with no drag must not fall through to the
        // card's navigate-on-click handler
        onclick: (e) => { e.stopPropagation(); }
      }, [el('span', { class: 'bag-grip-dots' }, dots)]);
      return grip;
    }

    function snapshotCardTops() {
      const tops = {};
      const root = document.getElementById('journalView');
      if (!root || !root.querySelectorAll) return tops;
      root.querySelectorAll('.bag-card-wrap[data-bag-id]').forEach(w => {
        if (w.getBoundingClientRect) tops[w.getAttribute('data-bag-id')] = w.getBoundingClientRect().top;
      });
      return tops;
    }

    function applyDragTransforms() {
      const d = dragState;
      if (!d) return;
      const S = d.dragH + 16; // card height + the 1rem inter-card gap
      const lift = liftShadow();
      d.order.forEach((id, i) => {
        const w = cardWraps[id];
        if (!w || !w.style) return;
        w.style.pointerEvents = 'none';
        if (i === d.fromIndex) {
          w.style.transition = 'none';
          w.style.transform = 'translateY(' + d.deltaY + 'px) scale(1.03)';
          w.style.zIndex = '30';
          w.style.boxShadow = lift;
          w.style.willChange = 'transform';
        } else {
          let t = 0;
          if (d.toIndex > d.fromIndex && i > d.fromIndex && i <= d.toIndex) t = -S;
          else if (d.toIndex < d.fromIndex && i >= d.toIndex && i < d.fromIndex) t = S;
          w.style.transition = 'transform 0.34s cubic-bezier(0.22, 1, 0.36, 1)';
          w.style.transform = 'translateY(' + t + 'px)';
          w.style.zIndex = '';
          w.style.boxShadow = '';
          w.style.willChange = '';
        }
      });
    }

    // FLIP: cards were just re-rendered into their new order. prevTops holds
    // each card's pre-reorder *visual* top (drag shifts included), so the delta
    // is measured against the clean final layout — no single-frame snap-back.
    function flipCards(prevTops, draggedId) {
      const root = document.getElementById('journalView');
      if (!root || !root.querySelectorAll) return;
      const wraps = Array.prototype.slice.call(root.querySelectorAll('.bag-card-wrap[data-bag-id]'));
      // 1) strip any residual transform, force one reflow, then measure clean tops
      wraps.forEach(w => { w.style.transition = 'none'; w.style.transform = 'none'; w.style.boxShadow = ''; });
      if (wraps[0] && wraps[0].offsetHeight != null) void wraps[0].offsetHeight;
      const lift = liftShadow();
      wraps.forEach(w => {
        const id = w.getAttribute('data-bag-id');
        const prev = prevTops[id];
        w.style.transition = '';
        w.style.transform = '';
        w.style.willChange = '';
        if (prev == null || typeof w.animate !== 'function' || !w.getBoundingClientRect) return;
        const dy = prev - w.getBoundingClientRect().top;
        const isDragged = id === draggedId;
        if (Math.abs(dy) < 0.5 && !isDragged) return;
        const flat = '0 0px 0px rgba(0,0,0,0)';
        const frames = isDragged
          ? [ { transform: 'translateY(' + dy + 'px) scale(1.035)', boxShadow: lift, zIndex: 30, offset: 0 },
              { transform: 'translateY(' + (dy * 0.18) + 'px) scale(1.014)', boxShadow: lift, zIndex: 30, offset: 0.5 },
              { transform: 'translateY(0px) scale(1)', boxShadow: flat, zIndex: 30, offset: 0.999 },
              { transform: 'translateY(0px) scale(1)', boxShadow: flat, zIndex: 1, offset: 1 } ]
          : [ { transform: 'translateY(' + dy + 'px)' }, { transform: 'translateY(0px)' } ];
        w.animate(frames, {
          duration: isDragged ? 620 : 520,
          easing: isDragged ? 'cubic-bezier(0.16, 1, 0.3, 1)' : 'cubic-bezier(0.22, 1, 0.36, 1)',
          fill: 'none'
        });
      });
    }

    function removeDragListeners() {
      if (typeof window === 'undefined') return;
      window.removeEventListener('pointermove', onDragMove);
      window.removeEventListener('pointerup', onDragUp);
      window.removeEventListener('pointercancel', onDragUp);
    }

    function onGripPointerDown(bagId, e) {
      if (e && e.button != null && e.button !== 0) return; // primary button only
      if (e) { e.preventDefault(); e.stopPropagation(); }
      const { bags } = BrewLog.loadJournal();
      const order = bags.map(b => b.id);
      const fromIndex = order.indexOf(bagId);
      if (fromIndex === -1 || order.length < 2) return;
      const rects = order.map(id => {
        const w = cardWraps[id];
        const r = (w && w.getBoundingClientRect) ? w.getBoundingClientRect() : { top: 0, height: 0 };
        return { top: r.top, h: r.height };
      });
      // a drag cancels any open delete-confirm flip
      if (confirmingCard) { setCardFlip(confirmingCard, false); }
      confirmingBagId = null; confirmingCard = null;
      dragState = { id: bagId, order, fromIndex, toIndex: fromIndex,
        startY: e.clientY, deltaY: 0, rects, dragH: rects[fromIndex].h };
      applyDragTransforms();
      if (typeof window !== 'undefined') {
        window.addEventListener('pointermove', onDragMove, { passive: false });
        window.addEventListener('pointerup', onDragUp);
        window.addEventListener('pointercancel', onDragUp);
      }
    }

    function onDragMove(e) {
      const d = dragState;
      if (!d) return;
      if (e.cancelable) e.preventDefault();
      const deltaY = e.clientY - d.startY;
      const center = d.rects[d.fromIndex].top + d.rects[d.fromIndex].h / 2 + deltaY;
      const toIndex = computeDropIndex(d.rects, d.fromIndex, center);
      if (deltaY !== d.deltaY || toIndex !== d.toIndex) {
        d.deltaY = deltaY; d.toIndex = toIndex;
        applyDragTransforms();
      }
    }

    function onDragUp() {
      removeDragListeners();
      const d = dragState;
      dragState = null;
      if (!d) return;
      const order = d.order.slice();
      const moved = order.splice(d.fromIndex, 1)[0];
      order.splice(d.toIndex, 0, moved);
      const { bags } = BrewLog.loadJournal();
      const byId = {};
      bags.forEach(b => { byId[b.id] = b; });
      const newBags = order.map(id => byId[id]).filter(Boolean);
      bags.forEach(b => { if (order.indexOf(b.id) === -1) newBags.push(b); });
      // Snapshot BEFORE the write/re-render so FLIP starts from the dragged-out
      // visual positions, then land the cards from there.
      const prevTops = snapshotCardTops();
      BrewLog.saveJournal(newBags);
      applyRoute();
      if (!prefersReducedMotion()) flipCards(prevTops, d.id);
    }

    // Toolbar "赏味期排序": same FLIP landing, no single lifted card.
    function onSortFreshness() {
      const { bags } = BrewLog.loadJournal();
      if (bags.length < 2) return;
      const prevTops = snapshotCardTops();
      BrewLog.saveJournal(sortBagsByFreshness(bags));
      applyRoute();
      if (!prefersReducedMotion()) flipCards(prevTops, null);
    }

    // ── Dark mode (☾/☀) ──────────────────────────────────────────────
    // Default follows the system; a manual toggle overrides it and persists.
    // The swap is instant: the theme is a [data-theme] attribute on <html>,
    // so CSS sees an ordinary cascade change (never a mid-transition var()
    // mutation, which is the "light bg + dark text" trap from the handoff).
    const THEME_KEY = 'grinder-theme';
    let themeManual = null; // true=dark, false=light, null=follow system

    function resolveEffectiveDark(manual, systemDark) {
      return manual != null ? manual : systemDark;
    }
    function systemPrefersDark() {
      return typeof matchMedia === 'function' && matchMedia('(prefers-color-scheme: dark)').matches;
    }
    function effectiveDark() {
      return resolveEffectiveDark(themeManual, systemPrefersDark());
    }

    function applyTheme() {
      const root = document.documentElement;
      if (root) {
        if (themeManual == null) {
          if (root.removeAttribute) root.removeAttribute('data-theme'); // CSS follows system
        } else if (root.setAttribute) {
          root.setAttribute('data-theme', themeManual ? 'dark' : 'light');
        }
      }
      updateThemeToggle();
    }

    function updateThemeToggle() {
      const btn = document.getElementById('themeToggle');
      if (!btn) return;
      const dark = effectiveDark();
      const L = logLabels();
      btn.textContent = dark ? '☀' : '☾';
      if (btn.setAttribute) {
        btn.setAttribute('aria-label', dark ? L.themeToLight : L.themeToDark);
        btn.setAttribute('title', dark ? L.themeToLight : L.themeToDark);
      }
    }

    function toggleTheme() {
      themeManual = !effectiveDark();
      try {
        if (typeof localStorage !== 'undefined') {
          localStorage.setItem(THEME_KEY, themeManual ? 'dark' : 'light');
        }
      } catch (e) { /* storage unavailable — theme stays session-only */ }
      applyTheme();
    }

    function initTheme() {
      try {
        const saved = typeof localStorage !== 'undefined' ? localStorage.getItem(THEME_KEY) : null;
        themeManual = saved === 'dark' ? true : saved === 'light' ? false : null;
      } catch (e) { themeManual = null; }
      applyTheme();
      if (typeof matchMedia === 'function') {
        const mq = matchMedia('(prefers-color-scheme: dark)');
        // While following system, CSS reskins itself; only the icon needs a nudge.
        const onChange = () => { if (themeManual == null) updateThemeToggle(); };
        if (mq.addEventListener) mq.addEventListener('change', onChange);
        else if (mq.addListener) mq.addListener(onChange);
      }
    }

    function setCardFlip(refs, confirming) {
      refs.flip.classList.toggle('is-confirming', confirming);
      // inert pulls the hidden face out of tab order and the a11y tree
      refs.front.inert = confirming;
      refs.back.inert = !confirming;
    }

    function onDeleteBagClick(bagId, refs) {
      // One confirm at a time: a new × flips the previous card back.
      if (confirmingCard && confirmingCard !== refs) setCardFlip(confirmingCard, false);
      confirmingBagId = bagId;
      confirmingCard = refs || null;
      if (refs) setCardFlip(refs, true);
    }

    function onKeepBag() {
      if (confirmingCard) setCardFlip(confirmingCard, false);
      confirmingBagId = null;
      confirmingCard = null;
    }

    function onConfirmDeleteBag(bagId, wrap) {
      // Flip back toward the front while the card collapses (matches the v2 rhythm).
      if (confirmingCard && confirmingCard.wrap === wrap) setCardFlip(confirmingCard, false);
      confirmingBagId = null;
      confirmingCard = null;
      const finish = () => {
        const L = logLabels();
        const { bags } = BrewLog.loadJournal();
        const index = bags.findIndex(b => b.id === bagId);
        if (index === -1) { applyRoute(); return; }
        const bag = bags[index];
        bags.splice(index, 1);
        BrewLog.saveJournal(bags);
        lastDeletedBag = { bag, index };
        applyRoute();
        showToast(L.deletedBagToast(bag.name || L.untitledBag), {
          actionLabel: L.undo, onAction: onUndoDeleteBag,
          durationMs: 6000, countdown: true  // undo window matches the toast's line
        });
      };
      if (!wrap || prefersReducedMotion()) { finish(); return; }
      // Collapse the card out first; the journal write lands when it's gone.
      wrap.classList.add('is-collapsing');
      setTimeout(() => wrap.classList.add('is-collapsed'), 20);
      setTimeout(finish, 400);
    }

    function onUndoDeleteBag() {
      if (!lastDeletedBag) return;
      const { bags } = BrewLog.loadJournal();
      const index = Math.max(0, Math.min(lastDeletedBag.index, bags.length));
      bags.splice(index, 0, lastDeletedBag.bag);
      BrewLog.saveJournal(bags);
      const bagId = lastDeletedBag.bag.id;
      lastDeletedBag = null;
      if (prefersReducedMotion()) { applyRoute(); return; }
      // Mount the card collapsed, then let it expand back into its old spot.
      enteringBagId = bagId;
      enteringWrap = null;
      applyRoute();
      enteringBagId = null;
      const wrap = enteringWrap;
      enteringWrap = null;
      if (!wrap) return;
      setTimeout(() => wrap.classList.remove('is-collapsed'), 40);
      setTimeout(() => wrap.classList.remove('is-collapsing'), 540);
    }

    // Discard is immediate; the toast's undo window (one most-recent discard,
    // in-memory only) is the safety net. A reload makes the discard final.
    let lastDiscarded = null;
    function onDiscardBrew(bagId, brewId) {
      const L = logLabels();
      const { bags } = BrewLog.loadJournal();
      const removed = removeBrewFromBags(bags, bagId, brewId);
      if (!removed) return;
      BrewLog.saveJournal(bags);
      lastDiscarded = { bagId, brew: removed.brew, index: removed.index };
      navigate('#/bag/' + bagId);
      showToast(L.discardedToast, { actionLabel: L.undo, onAction: onUndoDiscard });
    }

    function onUndoDiscard() {
      if (!lastDiscarded) return;
      const { bags } = BrewLog.loadJournal();
      const ok = restoreBrewToBags(bags, lastDiscarded.bagId, lastDiscarded.brew, lastDiscarded.index);
      if (ok) {
        BrewLog.saveJournal(bags);
        navigate('#/bag/' + lastDiscarded.bagId);
      }
      lastDiscarded = null;
    }

    function onLogKeydown(e) {
      const t = e.target;
      if (t && (t.isContentEditable || t.tagName === 'INPUT' || t.tagName === 'TEXTAREA')) {
        if (t.isContentEditable && e.key === 'Enter' && !e.shiftKey) {
          const isProse = t.classList && t.classList.contains('brew-prose');
          if (!isProse) { e.preventDefault(); t.blur(); }
        }
        return;
      }
      const journalView = document.getElementById('journalView');
      if (!journalView || journalView.hidden) return;
      if (e.key === 'n' || e.key === 'N') {
        const shell = journalView.querySelector('.journal-shell[data-bag-id]');
        if (shell && shell.dataset.bagId) { e.preventDefault(); onNewBrew(shell.dataset.bagId); }
      }
    }

    // Arrow bounce helper
    const arrowEl = document.getElementById('directionArrow');
    function bounceArrow() {
      arrowEl.classList.add('bounce');
      arrowEl.addEventListener('transitionend', () => arrowEl.classList.remove('bounce'), { once: true });
    }

    // Language fade helper
    const containerEl = document.querySelector('.container');
    function fadeSwitch(callback) {
      containerEl.style.opacity = '0';
      containerEl.addEventListener('transitionend', () => {
        callback();
        containerEl.style.opacity = '1';
      }, { once: true });
    }

    // Event Listeners
    // Language switcher
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.classList.contains('active')) return;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentLang = btn.dataset.lang;
        document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
        fadeSwitch(() => { updateTexts(); convert(); applyRoute(); });
      });
    });

    // '记录这次冲煮 →' link: jump to log view with a fresh blank page.
    if (elements.logLinkBtn) {
      elements.logLinkBtn.addEventListener('click', () => navigate('#/'));
    }

    // Source grinder select
    elements.sourceSelect.addEventListener('change', () => {
      sourceGrinder = elements.sourceSelect.value;
      const t = i18n[currentLang];
      elements.inputUnit.textContent = t.units[sourceGrinder];
      updateInputConfig();
      elements.inputValue.value = '';
      bounceArrow();
      convert();
    });

    // Target grinder select
    elements.targetSelect.addEventListener('change', () => {
      targetGrinder = elements.targetSelect.value;
      bounceArrow();
      convert();
    });

    // Swap direction button
    arrowEl.addEventListener('click', () => {
      // Swap state
      [sourceGrinder, targetGrinder] = [targetGrinder, sourceGrinder];

      // Sync selects
      elements.sourceSelect.value = sourceGrinder;
      elements.targetSelect.value = targetGrinder;

      // Rotation animation
      arrowEl.classList.add('swap');
      arrowEl.addEventListener('transitionend', () => arrowEl.classList.remove('swap'), { once: true });

      // Update UI
      updateInputConfig();
      elements.inputValue.value = '';
      updateTexts();
      convert();
    });

    // Input field
    elements.inputValue.addEventListener('input', convert);

    // View switcher (tab buttons + hashchange)
    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        navigate(btn.dataset.view === 'convert' ? '#/convert' : '#/');
      });
    });
    if (typeof window !== 'undefined') {
      window.addEventListener('hashchange', applyRoute);
    }

    // Journal delegated handlers (survive re-renders)
    const journalRoot = document.getElementById('journalView');
    if (journalRoot) {
      journalRoot.addEventListener('focusin', onEditableFocus);
      journalRoot.addEventListener('focusout', onEditableBlur);
      // Mobile date pickers commit via `change` without a reliable focusout
      // (e.g. iOS wheel dismissed by tapping elsewhere); saving is idempotent
      // so the eventual focusout doing it again is harmless.
      journalRoot.addEventListener('change', onEditableBlur);
      journalRoot.addEventListener('click', onLogClick);
    }
    document.addEventListener('keydown', onLogKeydown);

    // Theme toggle (☾/☀)
    const themeToggleEl = document.getElementById('themeToggle');
    if (themeToggleEl) themeToggleEl.addEventListener('click', toggleTheme);

    // Initialize
    initTheme();
    updateTexts();
    updateInputConfig();
    applyRoute();
  </script>

  <script>
    // Service Worker registration. Only runs on https or localhost; skipped on file://.
    if ('serviceWorker' in navigator
        && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then((reg) => {
          // A worker reaching 'installed' while a controller exists means an
          // update (not first install). The page keeps running the old code
          // until reloaded, so offer a tap-to-refresh — never auto-reload,
          // which could interrupt an in-progress contenteditable edit.
          reg.addEventListener('updatefound', () => {
            const worker = reg.installing;
            if (!worker) return;
            worker.addEventListener('statechange', () => {
              if (worker.state !== 'installed' || !navigator.serviceWorker.controller) return;
              const L = logLabels();
              showToast(L.swUpdateToast, {
                actionLabel: L.swRefresh,
                onAction: () => location.reload(),
                durationMs: 10000
              });
            });
          });
        }).catch(() => {});
      });
    }

    // Ask the browser to keep the local journal from being evicted under
    // storage pressure. Feature-guarded; silent — no permission UI. (ADR 0003)
    if (navigator.storage && typeof navigator.storage.persist === 'function') {
      navigator.storage.persisted()
        .then((already) => already ? true : navigator.storage.persist())
        .catch(() => {});
    }
  </script>
</body>
</html>
