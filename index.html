        notationDesc: "Format: X.Y.Z where X=rotation, Y=number(0-9), Z=tick(0-9)",
        notationExample: "e.g. 0.7.5 = rotation 0, number 7, tick 5 = 75 clicks",
        disclaimer: "Calibrated with official references and Honest Coffee Guide mapping data (verified on 2026-02-16). Fine-tune according to taste.",
        outOfRange: "Setting out of typical range",
        swapDirection: "Swap direction",
        sameGrinder: "Please select different grinders",
        sourceLabel: "Source grinder",
        targetLabel: "Target grinder",
        resultRegion: "Conversion result",
        tabJournal: "Journal",
        tabConverter: "Converter",
        recordThisBrew: "Record this brew →",
        grinders: {
          c40: "Comandante C40",
          kUltra: "1Zpresso K-Ultra",
          ek43: "Mahlkönig EK43"
        },
        units: {
          c40: "C40 clicks",
          kUltra: "K-Ultra clicks",
          ek43: "EK43 setting"
        },
        brewMethods: {
          espresso: "Espresso",
          mokaPot: "Moka Pot",
          aeropressConc: "AeroPress (concentrated)",
          pourOver: "V60 / Pour Over",
          aeropressLight: "AeroPress (lighter)",
          frenchPress: "French Press",
          coldBrew: "Cold Brew"
        }
      }
    };

    // State
    let currentLang = 'zh';
    let sourceGrinder = 'c40';
    let targetGrinder = 'kUltra';

    // DOM Elements
    const elements = {
      title: document.getElementById('title'),
      subtitle: document.getElementById('subtitle'),
      directionLabel: document.getElementById('directionLabel'),
      sourceSelect: document.getElementById('sourceSelect'),
      targetSelect: document.getElementById('targetSelect'),
      inputLabel: document.getElementById('inputLabel'),
      inputValue: document.getElementById('inputValue'),
      inputUnit: document.getElementById('inputUnit'),
      resultLabel: document.getElementById('resultLabel'),
      resultPlaceholder: document.getElementById('resultPlaceholder'),
      resultContent: document.getElementById('resultContent'),
      resultValue: document.getElementById('resultValue'),
      resultUnit: document.getElementById('resultUnit'),
      resultNotation: document.getElementById('resultNotation'),
      recommendLabel: document.getElementById('recommendLabel'),
      brewMethod: document.getElementById('brewMethod'),
      warning: document.getElementById('warning'),
      warningText: document.getElementById('warningText'),
      notationExplain: document.getElementById('notationExplain'),
      notationDesc: document.getElementById('notationDesc'),
      notationExample: document.getElementById('notationExample'),
      disclaimer: document.getElementById('disclaimer'),
      directionArrow: document.getElementById('directionArrow'),
      viewBtnJournal: document.getElementById('viewBtnJournal'),
      viewBtnConverter: document.getElementById('viewBtnConverter'),
      logLinkBtn: document.getElementById('logLinkBtn')
    };

    // Conversion functions
    function interpolatePiecewise(value, points) {
      if (!Array.isArray(points) || points.length < 2) return value;

      if (value <= points[0][0]) {
        const [x0, y0] = points[0];
        const [x1, y1] = points[1];
        return y0 + ((value - x0) * (y1 - y0)) / (x1 - x0);
      }

      for (let i = 1; i < points.length; i++) {
        const [x0, y0] = points[i - 1];
        const [x1, y1] = points[i];
        if (value <= x1) {
          if (x1 === x0) return y1;
          return y0 + ((value - x0) * (y1 - y0)) / (x1 - x0);
        }
      }

      const [x0, y0] = points[points.length - 2];
      const [x1, y1] = points[points.length - 1];
      return y1 + ((value - x1) * (y1 - y0)) / (x1 - x0);
    }

    function clampToGrinderRange(value, grinderKey) {
      const config = GRINDERS[grinderKey];
      if (!config) return value;
      return Math.min(config.max, Math.max(config.min, value));
    }

    // Convert any grinder to K-Ultra (intermediate value)
    function toKUltra(value, source) {
      switch (source) {
        case 'c40': return interpolatePiecewise(value, C40_TO_K_POINTS);
        case 'kUltra': return value;
        case 'ek43': return interpolatePiecewise(value, EK43_TO_K_POINTS);
        default: return value;
      }
    }

    // Convert K-Ultra to any grinder
    function fromKUltra(kUltraValue, target) {
      switch (target) {
        case 'c40': return interpolatePiecewise(kUltraValue, K_TO_C40_POINTS);
        case 'kUltra': return kUltraValue;
        case 'ek43': return interpolatePiecewise(kUltraValue, K_TO_EK43_POINTS);
        default: return kUltraValue;
      }
    }

    // Main conversion: source → K-Ultra → target
    function convertValue(value, source, target) {
      if (source === target) return clampToGrinderRange(value, target);
      const kUltraValue = toKUltra(value, source);
      const converted = fromKUltra(kUltraValue, target);
      return clampToGrinderRange(converted, target);
    }

    // Format result based on target grinder
    function formatResult(value, target) {
      const config = GRINDERS[target];
      return Number(value.toFixed(config.decimals));
    }

    function clicksToNotation(clicks) {
      const rotation = Math.floor(clicks / 100);
      const remaining = clicks % 100;
      const number = Math.floor(remaining / 10);
      const tick = remaining % 10;
      return `${rotation}.${number}.${tick}`;
    }

    // Brew method by K-Ultra (used as reference for all grinders)
    function getBrewMethodByKUltra(clicks, lang) {
      const methods = i18n[lang].brewMethods;
      if (clicks < 40) return methods.espresso;
      if (clicks < 55) return methods.mokaPot;
      if (clicks < 68) return methods.aeropressConc;
      if (clicks < 90) return methods.pourOver;
      if (clicks < 98) return methods.aeropressLight;
      if (clicks < 112) return methods.frenchPress;
      return methods.coldBrew;
    }

    // Brew method by C40
    function getBrewMethodByC40(clicks, lang) {
      const methods = i18n[lang].brewMethods;
      if (clicks < 14) return methods.espresso;
      if (clicks < 17) return methods.mokaPot;
      if (clicks < 20) return methods.aeropressConc;
      if (clicks < 26) return methods.pourOver;
      if (clicks < 28) return methods.aeropressLight;
      if (clicks < 36) return methods.frenchPress;
      return methods.coldBrew;
    }

    // Brew method by EK43
    function getBrewMethodByEK43(setting, lang) {
      const methods = i18n[lang].brewMethods;
      if (setting < 1) return methods.espresso;
      if (setting < 3) return methods.mokaPot;
      if (setting < 6) return methods.aeropressConc;
      if (setting < 9) return methods.pourOver;
      if (setting < 11) return methods.aeropressLight;
      if (setting < 13) return methods.frenchPress;
      return methods.coldBrew;
    }

    // Get brew method based on grinder type
    function getBrewMethod(value, grinder, lang) {
      switch (grinder) {
        case 'c40': return getBrewMethodByC40(value, lang);
        case 'kUltra': return getBrewMethodByKUltra(value, lang);
        case 'ek43': return getBrewMethodByEK43(value, lang);
        default: return '';
      }
    }

    // Update UI texts
    function updateTexts() {
      const t = i18n[currentLang];
      elements.title.textContent = t.title;
      elements.subtitle.textContent = t.subtitle;
      elements.directionLabel.textContent = t.directionLabel;
      elements.inputLabel.textContent = t.inputLabel;
      elements.inputValue.placeholder = t.inputPlaceholder;
      elements.resultLabel.textContent = t.resultLabel;
      elements.resultPlaceholder.textContent = t.resultPlaceholder;
      elements.recommendLabel.textContent = t.recommendLabel;
      elements.notationExplain.textContent = t.notationExplain;
      elements.notationDesc.textContent = t.notationDesc;
      elements.notationExample.textContent = t.notationExample;
      elements.disclaimer.textContent = t.disclaimer;

      // Update ARIA labels for current language
      elements.directionArrow.setAttribute('aria-label', t.swapDirection);
      elements.sourceSelect.setAttribute('aria-label', t.sourceLabel);
      elements.targetSelect.setAttribute('aria-label', t.targetLabel);
      document.querySelector('.result-container').setAttribute('aria-label', t.resultRegion);

      // Update input unit based on source grinder
      elements.inputUnit.textContent = t.units[sourceGrinder];

      // Update result unit based on target grinder
      elements.resultUnit.textContent = t.units[targetGrinder];

      // View-switcher tabs + log-link button
      if (elements.viewBtnJournal) elements.viewBtnJournal.textContent = t.tabJournal;
      if (elements.viewBtnConverter) elements.viewBtnConverter.textContent = t.tabConverter;
      if (elements.logLinkBtn) elements.logLinkBtn.textContent = t.recordThisBrew;
    }

    // Update input field attributes based on source grinder
    function updateInputConfig() {
      const config = GRINDERS[sourceGrinder];
      elements.inputValue.min = config.min;
      elements.inputValue.max = config.max;
      elements.inputValue.step = config.step;
    }

    // Convert and display result
    function convert() {
      const t = i18n[currentLang];
      const input = parseFloat(elements.inputValue.value);

      // Check if same grinder selected
      if (sourceGrinder === targetGrinder) {
        elements.resultPlaceholder.classList.remove('hidden');
        elements.resultPlaceholder.textContent = t.sameGrinder;
        elements.resultContent.classList.add('result-content-hidden');
        elements.warning.classList.remove('show');
        return;
      }

      if (isNaN(input) || elements.inputValue.value === '') {
        elements.resultPlaceholder.classList.remove('hidden');
        elements.resultPlaceholder.textContent = t.resultPlaceholder;
        elements.resultContent.classList.add('result-content-hidden');
        elements.warning.classList.remove('show');
        return;
      }

      const sourceConfig = GRINDERS[sourceGrinder];
      const isOutOfRange = input < sourceConfig.min || input > sourceConfig.max;

      // Perform conversion
      const rawResult = convertValue(input, sourceGrinder, targetGrinder);
      const result = formatResult(rawResult, targetGrinder);

      // Show result
      elements.resultPlaceholder.classList.add('hidden');
      elements.resultContent.classList.remove('result-content-hidden');
      elements.resultValue.textContent = result;
      elements.resultUnit.textContent = t.units[targetGrinder];

      // Show notation for K-Ultra output
      if (targetGrinder === 'kUltra') {
        elements.resultNotation.classList.remove('result-content-hidden');
        elements.resultNotation.textContent = `(${clicksToNotation(Math.round(result))})`;
      } else {
        elements.resultNotation.classList.add('result-content-hidden');
      }

      // Get brew method based on target grinder
      elements.brewMethod.textContent = getBrewMethod(result, targetGrinder, currentLang);

      // Warning
      if (isOutOfRange) {
        elements.warning.classList.add('show');
        elements.warningText.textContent = t.outOfRange;
      } else {
        elements.warning.classList.remove('show');
      }
    }

    // ─────────────────────────────────────────────────────────────
    // Roast level: enum + migration for historical free-text values
    // ─────────────────────────────────────────────────────────────
    const ROAST_LEVELS = ['veryLight', 'light', 'medium', 'dark'];
    const ROAST_LEVEL_ALIASES = {
      '超浅烘': 'veryLight', '浅烘': 'light', '中烘': 'medium', '深烘': 'dark',
      '淺烘': 'light', '中焙': 'medium', '深焙': 'dark',
      'extra light': 'veryLight', 'very light': 'veryLight',
      'light': 'light', 'medium': 'medium', 'dark': 'dark'
    };
    function normalizeRoastLevel(raw) {
      if (typeof raw !== 'string') return '';
      const trimmed = raw.trim();
      if (!trimmed) return '';
      if (ROAST_LEVELS.indexOf(trimmed) !== -1) return trimmed;
      return ROAST_LEVEL_ALIASES[trimmed]
          || ROAST_LEVEL_ALIASES[trimmed.toLowerCase()]
          || '';
    }

    // ─────────────────────────────────────────────────────────────
    // BrewLog: brew-session journal (localStorage-backed)
    // ─────────────────────────────────────────────────────────────
    var BrewLog = (() => {
      const STORAGE_KEY = 'grinder-brew-log-v1';
      const SCHEMA_VERSION = 1;

      function newId() {
        // time-sortable 22-char id: 13-char base36 timestamp + 9-char random
        const t = Date.now().toString(36).padStart(9, '0');
        const r = Math.random().toString(36).slice(2, 11).padStart(9, '0');
        return t + r;
      }

      function todayISO() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
      }

      function createEntry(overrides) {
        return {
          id: newId(),
          schemaVersion: SCHEMA_VERSION,
          createdAt: new Date().toISOString(),
          date: todayISO(),
          weather: '',
          beans: { name: '', origin: '', roastDate: '', roastLevel: '' },
          grinder: { model: '', setting: '' },
          brew: {
            method: '', dripper: '', waterTempC: '',
            dose: '', yield: '', totalTimeSec: '', pourSegments: ''
          },
          extraction: { tds: '', ey: '' },
          rating: 0,
          flavorNotes: '',
          reflection: '',
          ...(overrides || {})
        };
      }

      // Validate a single entry loosely — drop malformed records, never throw.
      // Imported scalars must be string/number primitives; arrays and objects are
      // rejected per-field so a crafted import can't sneak `[object Object]` into
      // the rendered spread.
      function isPrimitiveScalar(v) {
        return typeof v === 'string' || (typeof v === 'number' && Number.isFinite(v));
      }
      function sanitizeEntry(raw) {
        if (!raw || typeof raw !== 'object') return null;
        if (typeof raw.id !== 'string' || !raw.id) return null;
        const base = createEntry({ id: raw.id });
        // Shallow-merge known scalar fields, skipping non-primitive payloads
        for (const k of ['schemaVersion', 'createdAt', 'date', 'weather',
                         'rating', 'flavorNotes', 'reflection']) {
          if (k in raw && isPrimitiveScalar(raw[k])) base[k] = raw[k];
        }
        // Nested groups: only copy recognised primitive subfields
        const groups = {
          beans: ['name', 'origin', 'roastDate', 'roastLevel'],
          grinder: ['model', 'setting'],
          brew: ['method', 'dripper', 'waterTempC', 'dose', 'yield',
                 'totalTimeSec', 'pourSegments'],
          extraction: ['tds', 'ey']
        };
        for (const [g, fields] of Object.entries(groups)) {
          const src = raw[g];
          if (src && typeof src === 'object' && !Array.isArray(src)) {
            for (const f of fields) {
              if (f in src && isPrimitiveScalar(src[f])) base[g][f] = src[f];
            }
          }
        }
        // Rating must be integer 0-5
        const r = Number(base.rating);
        base.rating = Number.isFinite(r) ? Math.max(0, Math.min(5, Math.round(r))) : 0;
        // Roast level: coerce historical free-text values to the enum keys
        base.beans.roastLevel = normalizeRoastLevel(base.beans.roastLevel);
        return base;
      }

      function load() {
        try {
          const raw = (typeof localStorage !== 'undefined')
            ? localStorage.getItem(STORAGE_KEY) : null;
          if (!raw) return { entries: [], corrupt: false };
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return { entries: [], corrupt: true };
          const entries = parsed.map(sanitizeEntry).filter(Boolean);
          return { entries, corrupt: false };
        } catch (_) {
          return { entries: [], corrupt: true };
        }
      }

      function save(entries) {
        try {
          if (typeof localStorage === 'undefined') return { ok: false, reason: 'unavailable' };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
          return { ok: true };
        } catch (err) {
          const reason = (err && err.name === 'QuotaExceededError') ? 'quota' : 'unknown';
          return { ok: false, reason };
        }
      }

      // Merge an import payload into existing entries; id collisions keep newest by createdAt.
      function mergeImport(existing, incoming) {
        if (!Array.isArray(incoming)) return { entries: existing, added: 0, skipped: 0 };
        const byId = new Map(existing.map(e => [e.id, e]));
        let added = 0;
        let skipped = 0;
        for (const raw of incoming) {
          const clean = sanitizeEntry(raw);
          if (!clean) { skipped++; continue; }
          const prev = byId.get(clean.id);
          if (!prev) { byId.set(clean.id, clean); added++; continue; }
          // Collision: keep whichever has the later createdAt (string compare works for ISO)
          if ((clean.createdAt || '') > (prev.createdAt || '')) {
            byId.set(clean.id, clean);
          } else {
            skipped++;
          }
        }
        return { entries: Array.from(byId.values()), added, skipped };
      }

      function exportPayload(entries) {
        return {
          schemaVersion: SCHEMA_VERSION,
          exportedAt: new Date().toISOString(),
          entries: entries
        };
      }

      // Accept either a raw array or an export payload { entries: [...] }
      function extractEntries(parsed) {
        if (Array.isArray(parsed)) return parsed;
        if (parsed && Array.isArray(parsed.entries)) return parsed.entries;
        return null;
      }

      const JOURNAL_VERSION = 2;
      const STORAGE_KEY_V2 = 'grinder-brew-journal-v2';
      const STORAGE_KEY_BACKUP = 'grinder-brew-backup-v1';

      function getLastBackupAt() {
        try {
          return (typeof localStorage !== 'undefined')
            ? localStorage.getItem(STORAGE_KEY_BACKUP) : null;
        } catch (e) {
          return null;
        }
      }

      function setLastBackupAt(iso) {
        try {
          if (typeof localStorage !== 'undefined') {
            localStorage.setItem(STORAGE_KEY_BACKUP, String(iso));
          }
        } catch (e) { /* storage unavailable — non-fatal */ }
      }

      function createBrew(overrides) {
        return {
          id: newId(),
          createdAt: new Date().toISOString(),
          date: todayISO(),
          weather: '',
          grinderSetting: '',
          brew: {
            method: '', dripper: '', waterTempC: '',
            dose: '', yield: '', totalTimeSec: '', pourSegments: ''
          },
          extraction: { tds: '', ey: '' },
          rating: 0,
          flavorNotes: '',
          reflection: '',
          ...(overrides || {})
        };
      }

      function createBag(overrides) {
        return {
          id: newId(),
          schemaVersion: JOURNAL_VERSION,
          createdAt: new Date().toISOString(),
          name: '',
          origin: '',
          roastDate: '',
          roastLevel: '',
          grinderModel: '',
          status: 'active',
          brews: [],
          ...(overrides || {})
        };
      }

      function bagKey(name, roastDate) {
        return String(name || '').trim().toLowerCase()
          + ' ' + String(roastDate || '').trim();
      }

      // Deterministic djb2 hash → base36, so identical (name+roastDate) always
      // yields the same bag id (idempotent migration + re-import).
      function bagIdFromKey(key) {
        let h = 5381;
        for (let i = 0; i < key.length; i++) {
          h = (((h << 5) + h) + key.charCodeAt(i)) >>> 0;
        }
        return 'bag_' + h.toString(36);
      }

      // Grouping/merge key. Bags with a real natural identity (a name and/or a
      // roast date) consolidate by it; a bag with NO identity at all has nothing
      // to merge on, so it keys by its own id (prefixed with a NUL byte so it can
      // never collide with a natural key). Prevents identity-less bags from
      // collapsing into one — which would drop/duplicate bags on import.
      function bagGroupKey(name, roastDate, id) {
        const natural = bagKey(name, roastDate);
        return natural.trim() === '' ? '\u0000' + (id || '') : natural;
      }

      function sanitizeBrew(raw) {
        if (!raw || typeof raw !== 'object' || Array.isArray(raw)) return null;
        if (typeof raw.id !== 'string' || !raw.id) return null;
        const base = createBrew({ id: raw.id });
        for (const k of ['createdAt', 'date', 'weather', 'grinderSetting',
                         'rating', 'flavorNotes', 'reflection']) {
          if (k in raw && isPrimitiveScalar(raw[k])) base[k] = raw[k];
        }
        const groups = {
          brew: ['method', 'dripper', 'waterTempC', 'dose', 'yield',
                 'totalTimeSec', 'pourSegments'],
          extraction: ['tds', 'ey']
        };
        for (const [g, fields] of Object.entries(groups)) {
          const src = raw[g];
          if (src && typeof src === 'object' && !Array.isArray(src)) {
            for (const f of fields) {
              if (f in src && isPrimitiveScalar(src[f])) base[g][f] = src[f];
            }
          }
        }
        const r = Number(base.rating);
        base.rating = Number.isFinite(r) ? Math.max(0, Math.min(5, Math.round(r))) : 0;
        return base;
      }

      function sanitizeBag(raw) {
        if (!raw || typeof raw !== 'object' || Array.isArray(raw)) return null;
        if (typeof raw.id !== 'string' || !raw.id) return null;
        const base = createBag({ id: raw.id });
        for (const k of ['schemaVersion', 'createdAt', 'name', 'origin',
                         'roastDate', 'roastLevel', 'grinderModel']) {
          if (k in raw && isPrimitiveScalar(raw[k])) base[k] = raw[k];
        }
        base.roastLevel = normalizeRoastLevel(base.roastLevel);
        base.status = (raw.status === 'finished') ? 'finished' : 'active';
        base.brews = Array.isArray(raw.brews)
          ? raw.brews.map(sanitizeBrew).filter(Boolean)
          : [];
        return base;
      }

      // Consolidate sanitized v1 entries into v2 bags, keyed by (name + roastDate).
      // Bag identity fields are seeded from the first entry seen in each group;
      // brews keep their original entry id and createdAt for idempotent re-import.
      function migrateEntriesToBags(entries) {
        const order = [];
        const byKey = new Map();
        for (const entry of (entries || [])) {
          const beans = entry.beans || {};
          const grinder = entry.grinder || {};
          const key = bagGroupKey(beans.name, beans.roastDate, entry.id);
          let bag = byKey.get(key);
          if (!bag) {
            bag = createBag({
              id: bagIdFromKey(key),
              createdAt: entry.createdAt || new Date().toISOString(),
              name: beans.name || '',
              origin: beans.origin || '',
              roastDate: beans.roastDate || '',
              roastLevel: beans.roastLevel || '',
              grinderModel: grinder.model || '',
              brews: []
            });
            byKey.set(key, bag);
            order.push(key);
          } else if ((entry.createdAt || '') < (bag.createdAt || '')) {
            bag.createdAt = entry.createdAt;
          }
          bag.brews.push(createBrew({
            id: entry.id,
            createdAt: entry.createdAt || new Date().toISOString(),
            date: entry.date || '',
            weather: entry.weather || '',
            grinderSetting: grinder.setting || '',
            brew: Object.assign({}, entry.brew),
            extraction: Object.assign({}, entry.extraction),
            rating: entry.rating || 0,
            flavorNotes: entry.flavorNotes || '',
            reflection: entry.reflection || ''
          }));
        }
        return order.map(k => byKey.get(k));
      }

      function bagsFromParsed(parsed) {
        if (Array.isArray(parsed)) return parsed;
        if (parsed && Array.isArray(parsed.bags)) return parsed.bags;
        return null;
      }

      function saveJournal(bags) {
        try {
          if (typeof localStorage === 'undefined') return { ok: false, reason: 'unavailable' };
          localStorage.setItem(STORAGE_KEY_V2, JSON.stringify(bags));
          return { ok: true };
        } catch (err) {
          const reason = (err && err.name === 'QuotaExceededError') ? 'quota' : 'unknown';
          return { ok: false, reason };
        }
      }

      function loadJournal() {
        try {
          const rawV2 = (typeof localStorage !== 'undefined')
            ? localStorage.getItem(STORAGE_KEY_V2) : null;
          if (rawV2) {
            const arr = bagsFromParsed(JSON.parse(rawV2));
            if (!Array.isArray(arr)) return { bags: [], corrupt: true, migrated: false };
            return { bags: arr.map(sanitizeBag).filter(Boolean), corrupt: false, migrated: false };
          }
          // No v2 yet — migrate from v1 if present, persist, keep v1 as backup.
          const v1 = load();
          if (v1.entries.length === 0) {
            return { bags: [], corrupt: v1.corrupt, migrated: false };
          }
          const bags = migrateEntriesToBags(v1.entries);
          saveJournal(bags);
          return { bags, corrupt: v1.corrupt, migrated: true };
        } catch (_) {
          return { bags: [], corrupt: true, migrated: false };
        }
      }

      function exportJournal(bags) {
        return {
          schemaVersion: JOURNAL_VERSION,
          exportedAt: new Date().toISOString(),
          bags: bags
        };
      }

      // Accept v2 (payload {bags} or raw bag array) or v1 ({entries}/array/schemaVersion 1).
      // v1 shapes are migrated to bags so import is shape-agnostic.
      function extractBags(parsed) {
        if (parsed && parsed.schemaVersion === 1) {
          const entries = extractEntries(parsed);
          return entries ? migrateEntriesToBags(entries.map(sanitizeEntry).filter(Boolean)) : null;
        }
        const v2 = bagsFromParsed(parsed);
        if (v2) {
          // Distinguish v1 entries from v2 bags by the v1 signature (nested
          // `beans`/`grinder` objects), not by the presence of `brews` — a v2
          // bag that omits its (empty) brews array must not be misread as v1.
          const isObj = (x) => x && typeof x === 'object' && !Array.isArray(x);
          const isV1Entry = (e) => isObj(e) && (isObj(e.beans) || isObj(e.grinder));
          if (v2.length > 0 && v2.every(isV1Entry)) {
            return migrateEntriesToBags(v2.map(sanitizeEntry).filter(Boolean));
          }
          return v2;
        }
        const entries = extractEntries(parsed);
        if (entries) return migrateEntriesToBags(entries.map(sanitizeEntry).filter(Boolean));
        return null;
      }

      function mergeJournalImport(existing, incoming) {
        if (!Array.isArray(incoming)) return { bags: existing, addedBags: 0, addedBrews: 0 };
        const order = existing.map(b => bagGroupKey(b.name, b.roastDate, b.id));
        const byKey = new Map(existing.map(b => [bagGroupKey(b.name, b.roastDate, b.id), b]));
        let addedBags = 0;
        let addedBrews = 0;
        for (const raw of incoming) {
          const clean = sanitizeBag(raw);
          if (!clean) continue;
          const key = bagGroupKey(clean.name, clean.roastDate, clean.id);
          const prev = byKey.get(key);
          if (!prev) {
            byKey.set(key, clean);
            order.push(key);
            addedBags++;
            addedBrews += clean.brews.length;
            continue;
          }
          const brewById = new Map(prev.brews.map(b => [b.id, b]));
          for (const nb of clean.brews) {
            const old = brewById.get(nb.id);
            if (!old) { brewById.set(nb.id, nb); addedBrews++; }
            else if ((nb.createdAt || '') > (old.createdAt || '')) { brewById.set(nb.id, nb); }
          }
          prev.brews = Array.from(brewById.values());
        }
        return { bags: order.map(k => byKey.get(k)), addedBags, addedBrews };
      }

      function bestBrew(bag) {
        if (!bag || !Array.isArray(bag.brews) || bag.brews.length === 0) return null;
        let best = null;
        for (const b of bag.brews) {
          const r = Number(b.rating) || 0;
          if (r <= 0) continue;
          if (!best) { best = b; continue; }
          const br = Number(best.rating) || 0;
          if (r > br || (r === br && (b.createdAt || '') > (best.createdAt || ''))) best = b;
        }
        return best;
      }

      return {
        STORAGE_KEY,
        STORAGE_KEY_V2,
        SCHEMA_VERSION,
        JOURNAL_VERSION,
        createEntry,
        sanitizeEntry,
        load,
        save,
        mergeImport,
        exportPayload,
        extractEntries,
        todayISO,
        newId,
        createBag,
        createBrew,
        bagKey,
        bagIdFromKey,
        sanitizeBag,
        sanitizeBrew,
        migrateEntriesToBags,
        loadJournal,
        saveJournal,
        exportJournal,
        getLastBackupAt,
        setLastBackupAt,
        extractBags,
        mergeJournalImport,
        bestBrew
      };
    })();

    // ─────────────────────────────────────────────────────────────
    // Router: hash-based view switching
    //   #/                     → dashboard (default; legacy #/log[/<id>] too)
    //   #/bag/<id>[/<brewId>]  → bag timeline + (optional) open brew editor
    //   #/convert              → converter
    // ─────────────────────────────────────────────────────────────
    function parseRoute(hash) {
      const h = (hash || '').replace(/^#/, '').trim();
      if (h === '/convert') return { view: 'convert' };
      const bag = h.match(/^\/bag\/([^/]+)(?:\/([^/]+))?$/);
      if (bag) return { view: 'bag', bagId: bag[1], brewId: bag[2] || null };
      // '', '/', legacy '/log' and '/log/<id>' all land on the dashboard.
      return { view: 'dashboard' };
    }

    function navigate(hash) {
      if (typeof location !== 'undefined' && location.hash !== hash) {
        location.hash = hash;
      } else {
        applyRoute();
      }
    }

    function applyRoute() {
      const route = parseRoute(typeof location !== 'undefined' ? location.hash : '');
      const journalView = document.getElementById('journalView');
      const converterView = document.getElementById('converterView');
      const btnJournal = document.getElementById('viewBtnJournal');
      const btnConverter = document.getElementById('viewBtnConverter');

      const isConvert = route.view === 'convert';
      if (journalView) journalView.hidden = isConvert;
      if (converterView) converterView.hidden = !isConvert;
      if (btnJournal) btnJournal.classList.toggle('active', !isConvert);
      if (btnConverter) btnConverter.classList.toggle('active', isConvert);

      if (!isConvert && typeof renderJournal === 'function') {
        renderJournal(route);
      }
    }

    // ─────────────────────────────────────────────────────────────
    // Brew Log view rendering
    // ─────────────────────────────────────────────────────────────
    // Short provisional labels (Chinese first; full i18n lands in stage 6).
    const LOG_LABELS = {
      zh: {
        importBtn: '导入', exportBtn: '导出',
        newBag: '+ 新建', newFirstBag: '+ 记第一袋豆子',
        emptyBags: '— 还没有豆子 —', untitledBag: '未命名',
        backToBags: '← 返回', newBrew: '+ 记一杯', newFirstBrew: '+ 记第一杯',
        emptyBrews: '— 还没有冲煮记录 —',
        bestBrewLabel: '当前最佳', methodless: '未分组',
        brewCount: (n) => `${n} 杯`,
        bagName: '名称', bagOrigin: '产地', bagRoastDate: '烘焙日期',
        bagRoastLevel: '烘焙度', bagGrinderModel: '磨豆机',
        brewGrindSetting: '刻度', translateGrind: '换算 ⇄',
        discardBrew: '丢弃这一杯',
        discardConfirm: '确定丢弃这一页？此操作不可撤销。',
        corrupt: '读取到损坏的日志数据，已忽略无法解析的记录。',
        importPrompt: '粘贴日志 JSON（或取消）',
        importOk: (n) => `导入 ${n} 条`,
        importNone: '没有新增记录',
        weatherPh: '天气',
        secFlavor: '风味', secReflection: '复盘',
        brewMethod: '方式', brewDripper: '滤杯', brewWaterTemp: '水温 °C', brewDose: '粉量 g',
        brewYield: '出液 g', brewTime: '总时间 s', brewPours: '注水',
        extractionTds: 'TDS %', extractionEy: '萃取率 %',
        fieldPh: '⋯⋯', prosePh: '写点什么…'
      },
      en: {
        importBtn: 'Import', exportBtn: 'Export',
        newBag: '+ New', newFirstBag: '+ Add your first bag',
        emptyBags: '— no bags yet —', untitledBag: 'Untitled',
        backToBags: '← Back', newBrew: '+ New brew', newFirstBrew: '+ Log your first brew',
        emptyBrews: '— no brews yet —',
        bestBrewLabel: 'Best so far', methodless: 'Ungrouped',
        brewCount: (n) => `${n} brew${n === 1 ? '' : 's'}`,
        bagName: 'name', bagOrigin: 'origin', bagRoastDate: 'roast date',
        bagRoastLevel: 'roast', bagGrinderModel: 'grinder',
        brewGrindSetting: 'grind', translateGrind: 'convert ⇄',
        discardBrew: 'discard this brew',
        discardConfirm: 'Discard this page? This cannot be undone.',
        corrupt: 'Some log entries were unreadable and have been skipped.',
        importPrompt: 'Paste journal JSON (or cancel)',
        importOk: (n) => `imported ${n}`,
        importNone: 'nothing new to import',
        weatherPh: 'weather',
        secFlavor: 'Flavor', secReflection: 'Reflection',
        brewMethod: 'method', brewDripper: 'dripper', brewWaterTemp: 'water °C', brewDose: 'dose g',
        brewYield: 'yield g', brewTime: 'time s', brewPours: 'pours',
        extractionTds: 'TDS %', extractionEy: 'EY %',
        fieldPh: '⋯⋯', prosePh: 'write something…'
      }
    };

    function logLabels() { return LOG_LABELS[currentLang] || LOG_LABELS.zh; }

    function formatLogDate(isoDate, lang) {
      if (!isoDate) return '';
      const d = new Date(isoDate + 'T00:00:00');
      if (isNaN(d.getTime())) return isoDate;
      const weekdayZh = ['日', '一', '二', '三', '四', '五', '六'];
      const weekdayEn = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      if (lang === 'en') {
        const months = ['January', 'February', 'March', 'April', 'May', 'June',
                        'July', 'August', 'September', 'October', 'November', 'December'];
        return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} · ${weekdayEn[d.getDay()]}`;
      }
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}年${m}月${day}日  周${weekdayZh[d.getDay()]}`;
    }

    function formatRoastDate(isoDate) {
      if (!isoDate) return '';
      const d = new Date(isoDate + 'T00:00:00');
      if (isNaN(d.getTime())) return isoDate;
      const y = String(d.getFullYear()).slice(-2);
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}.${m}.${day}`;
    }

    // Whole days between the calendar day of `iso` and `nowMs` (default now).
    // Returns null for falsy/unparseable input. nowMs is injectable for tests.
    function relativeDays(iso, nowMs) {
      if (!iso) return null;
      const then = Date.parse(iso);
      if (Number.isNaN(then)) return null;
      const now = (typeof nowMs === 'number') ? nowMs : Date.now();
      const dayMs = 24 * 60 * 60 * 1000;
      const startOfDay = (ms) => {
        const d = new Date(ms);
        return Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
      };
      return Math.max(0, Math.round((startOfDay(now) - startOfDay(then)) / dayMs));
    }

    function getPath(obj, path) {
      return path.split('.').reduce((o, k) => (o == null ? o : o[k]), obj);
    }

    function clearChildren(node) {
      while (node && node.firstChild) node.removeChild(node.firstChild);
    }

    function el(tag, opts, children) {
      const node = document.createElement(tag);
      if (opts) {
        for (const [k, v] of Object.entries(opts)) {
          if (v == null || v === false) continue;
          if (k === 'class') node.className = v;
          else if (k === 'text') node.textContent = v;
          else if (k === 'dataset') Object.assign(node.dataset, v);
          else if (k.startsWith('on')) node.addEventListener(k.slice(2), v);
          else node.setAttribute(k, v);
        }
      }
      if (Array.isArray(children)) {
        for (const c of children) if (c) node.appendChild(c);
      }
      return node;
    }

    function renderJournal(route) {
      const root = document.getElementById('journalView');
      if (!root) return;
      clearChildren(root);
      const { bags, corrupt } = BrewLog.loadJournal();

      if (route.view === 'bag') {
        const bag = bags.find(b => b.id === route.bagId);
        if (!bag) { renderDashboard(root, bags, corrupt); return; }
        renderBagView(root, bags, bag, route.brewId);
        return;
      }
      renderDashboard(root, bags, corrupt);
    }

    function renderDashboard(root, bags, corrupt) {
      const L = logLabels();
      const shell = el('div', { class: 'journal-shell' });

      shell.appendChild(el('div', { class: 'journal-toolbar' }, [
        el('div', { class: 'journal-toolbar-group' }, [
          el('button', { class: 'journal-btn primary', type: 'button', text: L.newBag, onclick: onNewBag })
        ]),
        el('div', { class: 'journal-toolbar-group' }, [
          el('button', { class: 'journal-btn', type: 'button', text: L.importBtn, onclick: onImportJournal }),
          el('button', { class: 'journal-btn', type: 'button', text: L.exportBtn, onclick: onExportJournal })
        ])
      ]));

      if (corrupt) shell.appendChild(el('div', { class: 'journal-corrupt-banner', text: L.corrupt }));

      if (bags.length === 0) {
        shell.appendChild(el('div', { class: 'journal-empty' }, [
          el('div', { class: 'journal-empty-msg', text: L.emptyBags }),
          el('button', { class: 'journal-btn primary', type: 'button', text: L.newFirstBag, onclick: onNewBag })
        ]));
        root.appendChild(shell);
        return;
      }

      const grid = el('div', { class: 'bag-grid' });
      for (const bag of bags) grid.appendChild(renderBagCard(bag));
      shell.appendChild(grid);
      root.appendChild(shell);
    }

    function renderBagCard(bag) {
      const L = logLabels();
      const best = BrewLog.bestBrew(bag);
      const card = el('button', {
        class: 'bag-card' + (bag.status === 'finished' ? ' is-finished' : ''),
        type: 'button', 'data-bag-id': bag.id
      }, [
        el('div', { class: 'bag-card-name', text: bag.name || L.untitledBag }),
        el('div', { class: 'bag-card-meta', text: [
          bag.origin, formatRoastDate(bag.roastDate), bag.grinderModel
        ].filter(Boolean).join(' · ') }),
        el('div', { class: 'bag-card-stats', text:
          L.brewCount(bag.brews.length) + (best ? ' · ' + '✦'.repeat(Math.max(0, Math.min(5, best.rating))) : '')
        })
      ]);
      card.addEventListener('click', () => navigate('#/bag/' + bag.id));
      return card;
    }

    function onNewBag() {
      const { bags } = BrewLog.loadJournal();
      const bag = BrewLog.createBag();
      BrewLog.saveJournal([bag, ...bags]);
      navigate('#/bag/' + bag.id);
    }

    function onExportJournal() {
      const { bags } = BrewLog.loadJournal();
      const payload = BrewLog.exportJournal(bags);
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `brew-journal-${BrewLog.todayISO()}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function onImportJournal() {
      const L = logLabels();
      if (typeof prompt !== 'function') return;
      const raw = prompt(L.importPrompt);
      if (!raw) return;
      let parsed;
      try { parsed = JSON.parse(raw); } catch (_) { return; }
      const incoming = BrewLog.extractBags(parsed);
      if (!incoming) return;
      const { bags } = BrewLog.loadJournal();
      const { bags: merged, addedBags, addedBrews } = BrewLog.mergeJournalImport(bags, incoming);
      BrewLog.saveJournal(merged);
      if (typeof alert === 'function') {
        const added = addedBags + addedBrews;
        alert(added > 0 ? L.importOk(added) : L.importNone);
      }
      applyRoute();
    }

    function renderBagView(root, bags, bag, brewId) {
      const L = logLabels();
      const shell = el('div', { class: 'journal-shell', 'data-bag-id': bag.id });

      shell.appendChild(el('div', { class: 'journal-toolbar' }, [
        el('div', { class: 'journal-toolbar-group' }, [
          el('button', { class: 'journal-btn', type: 'button', text: L.backToBags,
            onclick: () => navigate('#/') })
        ]),
        el('div', { class: 'journal-toolbar-group' }, [
          el('button', { class: 'journal-btn primary', type: 'button', text: L.newBrew,
            onclick: () => onNewBrew(bag.id) })
        ])
      ]));

      shell.appendChild(renderBagHeader(bag));

      if (bag.brews.length === 0) {
        shell.appendChild(el('div', { class: 'journal-empty' }, [
          el('div', { class: 'journal-empty-msg', text: L.emptyBrews }),
          el('button', { class: 'journal-btn primary', type: 'button', text: L.newFirstBrew,
            onclick: () => onNewBrew(bag.id) })
        ]));
        root.appendChild(shell);
        return;
      }

      const best = BrewLog.bestBrew(bag);
      if (best) {
        shell.appendChild(el('div', { class: 'best-brew-banner', text: L.bestBrewLabel }));
        shell.appendChild(renderBrewCard(bag, best, brewId === best.id, true));
      }

      // Group remaining brews by method (compare like-with-like).
      const rest = bag.brews.filter(b => !best || b.id !== best.id);
      const byMethod = new Map();
      for (const b of rest) {
        const m = (b.brew && b.brew.method) ? String(b.brew.method) : L.methodless;
        if (!byMethod.has(m)) byMethod.set(m, []);
        byMethod.get(m).push(b);
      }
      for (const [method, group] of byMethod) {
        shell.appendChild(el('div', { class: 'method-group-title', text: method }));
        group
          .slice()
          .sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''))
          .forEach(b => shell.appendChild(renderBrewCard(bag, b, brewId === b.id, false)));
      }

      root.appendChild(shell);
    }

    function onNewBrew(bagId) {
      const { bags } = BrewLog.loadJournal();
      const bag = bags.find(b => b.id === bagId);
      if (!bag) return;
      const brew = BrewLog.createBrew();
      bag.brews = [brew, ...bag.brews];
      BrewLog.saveJournal(bags);
      navigate('#/bag/' + bagId + '/' + brew.id);
    }

    function renderBagHeader(bag) {
      const L = logLabels();
      const field = (fieldKey, labelKey, value, opts) => el('div', { class: 'bag-id-field' }, [
        el('div', { class: 'bag-id-label', text: L[labelKey] }),
        el('div', Object.assign({
          class: 'bag-id-value log-editable' + (value ? '' : ' is-empty'),
          contenteditable: 'true', spellcheck: 'false',
          'data-scope': 'bag', 'data-field': fieldKey,
          'data-placeholder': L.fieldPh, text: value || ''
        }, opts || {}))
      ]);
      return el('div', { class: 'bag-header', 'data-bag-id': bag.id }, [
        el('div', { class: 'bag-header-row' }, [
          field('name', 'bagName', bag.name),
          field('origin', 'bagOrigin', bag.origin)
        ]),
        el('div', { class: 'bag-header-row' }, [
          field('roastDate', 'bagRoastDate', bag.roastDate),
          field('roastLevel', 'bagRoastLevel', bag.roastLevel),
          field('grinderModel', 'bagGrinderModel', bag.grinderModel)
        ])
      ]);
    }

    const BREW_FIELD_SCHEMA = [
      { key: 'grinderSetting', labelKey: 'brewGrindSetting' },
      { key: 'brew.method', labelKey: 'brewMethod' },
      { key: 'brew.dripper', labelKey: 'brewDripper' },
      { key: 'brew.waterTempC', labelKey: 'brewWaterTemp' },
      { key: 'brew.dose', labelKey: 'brewDose' },
      { key: 'brew.yield', labelKey: 'brewYield' },
      { key: 'brew.totalTimeSec', labelKey: 'brewTime' },
      { key: 'brew.pourSegments', labelKey: 'brewPours' },
      { key: 'extraction.tds', labelKey: 'extractionTds' },
      { key: 'extraction.ey', labelKey: 'extractionEy' }
    ];

    function renderBrewRating(brew) {
      const rating = Math.max(0, Math.min(5, Number(brew.rating) || 0));
      const ratingEl = el('div', { class: 'brew-rating', role: 'radiogroup', 'aria-label': 'rating' });
      for (let i = 1; i <= 5; i++) {
        ratingEl.appendChild(el('span', {
          class: 'log-star' + (i <= rating ? '' : ' is-empty'),
          'data-rating': String(i), role: 'radio',
          'aria-checked': i === rating ? 'true' : 'false', tabindex: '0',
          text: i <= rating ? '✦' : '✧'
        }));
      }
      return ratingEl;
    }

    function renderBrewCard(bag, brew, isOpen, isBest) {
      const L = logLabels();
      const card = el('article', {
        class: 'brew-card' + (isBest ? ' is-best' : '') + (isOpen ? ' is-open' : ''),
        'data-bag-id': bag.id, 'data-brew-id': brew.id
      });

      card.appendChild(el('div', { class: 'brew-card-head' }, [
        el('span', {
          class: 'brew-date log-editable', contenteditable: 'true', spellcheck: 'false',
          'data-scope': 'brew', 'data-field': 'date', 'data-type': 'date',
          text: formatLogDate(brew.date, currentLang)
        }),
        el('span', {
          class: 'brew-weather log-editable' + (brew.weather ? '' : ' is-empty'),
          contenteditable: 'true', 'data-scope': 'brew', 'data-field': 'weather',
          'data-placeholder': L.weatherPh, text: brew.weather || ''
        }),
        renderBrewRating(brew)
      ]));

      // Collapsed cards show a one-line summary; the open card shows the full grid.
      if (!isOpen) {
        const summary = BREW_FIELD_SCHEMA.slice(0, 3)
          .map(f => getPath(brew, f.key)).filter(Boolean).join('  ·  ');
        card.appendChild(el('div', { class: 'brew-card-summary', text: summary || L.fieldPh }));
        card.addEventListener('click', (e) => {
          if (e.target.closest && e.target.closest('.log-editable, .log-star')) return;
          navigate('#/bag/' + bag.id + '/' + brew.id);
        });
        return card;
      }

      const grid = el('div', { class: 'brew-fields' });
      for (const f of BREW_FIELD_SCHEMA) {
        const val = getPath(brew, f.key);
        const isEmpty = val == null || val === '';
        grid.appendChild(el('div', { class: 'brew-field-label', text: L[f.labelKey] }));
        const value = el('div', {
          class: 'brew-field-value log-editable' + (isEmpty ? ' is-empty' : ''),
          contenteditable: 'true', 'data-scope': 'brew', 'data-field': f.key,
          'data-placeholder': L.fieldPh, text: isEmpty ? '' : String(val)
        });
        if (f.key === 'grinderSetting') {
          // Translate button is a SIBLING (not a child) so it neither pollutes the
          // field's textContent value nor gets wiped when the field saves on blur.
          grid.appendChild(el('div', { class: 'brew-grind-cell' }, [
            value,
            el('button', { class: 'grind-translate-btn', type: 'button',
              text: L.translateGrind, title: L.translateGrind })
          ]));
        } else {
          grid.appendChild(value);
        }
      }
      card.appendChild(grid);

      card.appendChild(el('div', { class: 'brew-section' }, [
        el('div', { class: 'brew-section-title', text: L.secFlavor }),
        el('div', { class: 'brew-prose log-editable' + (brew.flavorNotes ? '' : ' is-empty'),
          contenteditable: 'true', 'data-scope': 'brew', 'data-field': 'flavorNotes',
          'data-placeholder': L.prosePh, text: brew.flavorNotes || '' })
      ]));
      card.appendChild(el('div', { class: 'brew-section' }, [
        el('div', { class: 'brew-section-title', text: L.secReflection }),
        el('div', { class: 'brew-prose log-editable' + (brew.reflection ? '' : ' is-empty'),
          contenteditable: 'true', 'data-scope': 'brew', 'data-field': 'reflection',
          'data-placeholder': L.prosePh, text: brew.reflection || '' })
      ]));

      card.appendChild(el('div', { class: 'brew-footer-actions' }, [
        el('button', { class: 'brew-discard', type: 'button', text: L.discardBrew,
          onclick: () => onDiscardBrew(bag.id, brew.id) })
      ]));
      return card;
    }

    function parseIsoDate(iso) {
      if (typeof iso !== 'string') return null;
      const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!m) return null;
      const y = +m[1], mo = +m[2], d = +m[3];
      const dt = new Date(y, mo - 1, d);
      if (dt.getFullYear() !== y || dt.getMonth() !== mo - 1 || dt.getDate() !== d) return null;
      return dt;
    }

    // Write a value at a dotted path on a plain object; creates intermediate objects if missing.
    function setPath(obj, path, value) {
      const parts = path.split('.');
      let cur = obj;
      for (let i = 0; i < parts.length - 1; i++) {
        if (cur[parts[i]] == null || typeof cur[parts[i]] !== 'object') cur[parts[i]] = {};
        cur = cur[parts[i]];
      }
      cur[parts[parts.length - 1]] = value;
    }

    // Resolve an editable element to its (bagId, brewId|null, scope) target.
    function findEditableHost(target) {
      if (!target || !target.classList || !target.classList.contains('log-editable')) return null;
      const scope = target.dataset ? target.dataset.scope : null;
      if (scope === 'bag') {
        const header = target.closest ? target.closest('.bag-header') : null;
        const bagId = header && header.dataset ? header.dataset.bagId : null;
        return bagId ? { el: target, scope: 'bag', bagId, brewId: null } : null;
      }
      const card = target.closest ? target.closest('.brew-card') : null;
      if (!card || !card.dataset) return null;
      return { el: target, scope: 'brew', bagId: card.dataset.bagId, brewId: card.dataset.brewId };
    }

    function findBrew(bags, host) {
      const bag = bags.find(b => b.id === host.bagId);
      if (!bag) return { bag: null, brew: null };
      if (host.scope === 'bag') return { bag, brew: null };
      return { bag, brew: bag.brews.find(b => b.id === host.brewId) || null };
    }

    function onEditableFocus(e) {
      const host = findEditableHost(e.target);
      if (!host) return;
      host.el.classList.remove('is-empty');
      if (host.el.dataset.type === 'date') {
        const { bags } = BrewLog.loadJournal();
        const { brew } = findBrew(bags, host);
        if (brew) host.el.textContent = brew.date || '';
      }
    }

    function onEditableBlur(e) {
      const host = findEditableHost(e.target);
      if (!host) return;
      const path = host.el.dataset.field;
      if (!path) return;
      const { bags } = BrewLog.loadJournal();
      const { bag, brew } = findBrew(bags, host);
      const targetObj = host.scope === 'bag' ? bag : brew;
      if (!targetObj) return;

      // Prose fields allow line breaks (see onLogKeydown); read via innerText so
      // the browser-inserted block/<br> breaks survive as \n instead of being
      // collapsed by textContent. Single-line fields keep using textContent.
      const isProse = host.el.classList && host.el.classList.contains('brew-prose');
      let newValue = ((isProse ? host.el.innerText : host.el.textContent) || '').trim();
      if (host.el.dataset.type === 'date') {
        const parsed = parseIsoDate(newValue);
        if (!parsed) newValue = (brew && brew.date) || '';
        setPath(targetObj, path, newValue);
        host.el.textContent = formatLogDate(newValue, currentLang);
      } else {
        // A bag's roastDate is half of its natural identity key, so reject
        // free-text that isn't a valid ISO date — revert to the stored value
        // rather than letting garbage split the bag on a later import/merge.
        if (host.scope === 'bag' && path === 'roastDate' && newValue && !parseIsoDate(newValue)) {
          newValue = getPath(targetObj, path) || '';
        }
        setPath(targetObj, path, newValue);
        host.el.textContent = newValue;
      }
      host.el.classList.toggle('is-empty', newValue === '');
      BrewLog.saveJournal(bags);
    }

    function onLogClick(e) {
      // Inline grind-translate: jump to the converter pre-targeted at the bag's grinder.
      const translate = e.target && e.target.closest ? e.target.closest('.grind-translate-btn') : null;
      if (translate) {
        e.preventDefault();
        const header = document.querySelector('.bag-header');
        const modelEl = header ? header.querySelector('[data-field="grinderModel"]') : null;
        navigate('#/convert');
        preselectConverterTarget(modelEl ? modelEl.textContent : '');
        return;
      }
      const star = e.target && e.target.closest ? e.target.closest('.log-star') : null;
      if (!star) return;
      const card = star.closest('.brew-card');
      if (!card || !card.dataset) return;
      const { bags } = BrewLog.loadJournal();
      const bag = bags.find(b => b.id === card.dataset.bagId);
      if (!bag) return;
      const brew = bag.brews.find(b => b.id === card.dataset.brewId);
      if (!brew) return;
      const rating = Number(star.dataset.rating) || 0;
      brew.rating = brew.rating === rating ? 0 : rating;
      BrewLog.saveJournal(bags);
      applyRoute();
    }

    // Best-effort map a free-text grinder model to a converter target select value.
    function preselectConverterTarget(model) {
      const m = String(model || '').toLowerCase();
      let target = null;
      if (m.includes('c40') || m.includes('comandante')) target = 'c40';
      else if (m.includes('k-ultra') || m.includes('kultra') || m.includes('1zpresso')) target = 'kUltra';
      else if (m.includes('ek43') || m.includes('mahlk')) target = 'ek43';
      if (!target) return;
      targetGrinder = target;
      if (elements.targetSelect) elements.targetSelect.value = target;
      // The point of the translate jump is to convert INTO the bag's grinder, so
      // if the source already equals it the converter would just show the no-op
      // "same grinder" message. Pick a different source so a real conversion shows.
      if (sourceGrinder === target) {
        const alt = ['kUltra', 'c40', 'ek43'].find(g => g !== target);
        sourceGrinder = alt;
        if (elements.sourceSelect) elements.sourceSelect.value = alt;
      }
      if (typeof convert === 'function') convert();
    }

    function onDiscardBrew(bagId, brewId) {
      const L = logLabels();
      if (typeof confirm !== 'function' || !confirm(L.discardConfirm)) return;
      const { bags } = BrewLog.loadJournal();
      const bag = bags.find(b => b.id === bagId);
      if (!bag) return;
      bag.brews = bag.brews.filter(b => b.id !== brewId);
      BrewLog.saveJournal(bags);
      navigate('#/bag/' + bagId);
    }

    function onLogKeydown(e) {
      const t = e.target;
      if (t && (t.isContentEditable || t.tagName === 'INPUT' || t.tagName === 'TEXTAREA')) {
        if (t.isContentEditable && e.key === 'Enter' && !e.shiftKey) {
          const isProse = t.classList && t.classList.contains('brew-prose');
          if (!isProse) { e.preventDefault(); t.blur(); }
        }
        return;
      }
      const journalView = document.getElementById('journalView');
      if (!journalView || journalView.hidden) return;
      if (e.key === 'n' || e.key === 'N') {
        const shell = journalView.querySelector('.journal-shell[data-bag-id]');
        if (shell && shell.dataset.bagId) { e.preventDefault(); onNewBrew(shell.dataset.bagId); }
      }
    }

    // Arrow bounce helper
    const arrowEl = document.getElementById('directionArrow');
    function bounceArrow() {
      arrowEl.classList.add('bounce');
      arrowEl.addEventListener('transitionend', () => arrowEl.classList.remove('bounce'), { once: true });
    }

    // Language fade helper
    const containerEl = document.querySelector('.container');
    function fadeSwitch(callback) {
      containerEl.style.opacity = '0';
      containerEl.addEventListener('transitionend', () => {
        callback();
        containerEl.style.opacity = '1';
      }, { once: true });
    }

    // Event Listeners
    // Language switcher
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.classList.contains('active')) return;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentLang = btn.dataset.lang;
        document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
        fadeSwitch(() => { updateTexts(); convert(); applyRoute(); });
      });
    });

    // '记录这次冲煮 →' link: jump to log view with a fresh blank page.
    if (elements.logLinkBtn) {
      elements.logLinkBtn.addEventListener('click', () => navigate('#/'));
    }

    // Source grinder select
    elements.sourceSelect.addEventListener('change', () => {
      sourceGrinder = elements.sourceSelect.value;
      const t = i18n[currentLang];
      elements.inputUnit.textContent = t.units[sourceGrinder];
      updateInputConfig();
      elements.inputValue.value = '';
      bounceArrow();
      convert();
    });

    // Target grinder select
    elements.targetSelect.addEventListener('change', () => {
      targetGrinder = elements.targetSelect.value;
      bounceArrow();
      convert();
    });

    // Swap direction button
    arrowEl.addEventListener('click', () => {
      // Swap state
      [sourceGrinder, targetGrinder] = [targetGrinder, sourceGrinder];

      // Sync selects
      elements.sourceSelect.value = sourceGrinder;
      elements.targetSelect.value = targetGrinder;

      // Rotation animation
      arrowEl.classList.add('swap');
      arrowEl.addEventListener('transitionend', () => arrowEl.classList.remove('swap'), { once: true });

      // Update UI
      updateInputConfig();
      elements.inputValue.value = '';
      updateTexts();
      convert();
    });

    // Input field
    elements.inputValue.addEventListener('input', convert);

    // View switcher (tab buttons + hashchange)
    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        navigate(btn.dataset.view === 'convert' ? '#/convert' : '#/');
      });
    });
    if (typeof window !== 'undefined') {
      window.addEventListener('hashchange', applyRoute);
    }

    // Journal delegated handlers (survive re-renders)
    const journalRoot = document.getElementById('journalView');
    if (journalRoot) {
      journalRoot.addEventListener('focusin', onEditableFocus);
      journalRoot.addEventListener('focusout', onEditableBlur);
      journalRoot.addEventListener('click', onLogClick);
    }
    document.addEventListener('keydown', onLogKeydown);

    // Initialize
    updateTexts();
    updateInputConfig();
    applyRoute();
  </script>

  <script>
    // Service Worker registration. Only runs on https or localhost; skipped on file://.
    if ('serviceWorker' in navigator
        && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
